<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>案件進捗トラッカー</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  /* ── くすみシックカラー ── */
  --blue:#4a6fa5;--blue-l:#eef1f6;--blue-b:#c2cedf;
  --red:#9b4040;--red-l:#f7efef;--red-b:#deb8b8;
  --yellow:#8a6d3b;--yellow-l:#f7f2ea;--yellow-b:#d9c49c;
  --green:#456b54;--green-l:#edf3ef;--green-b:#b3cebc;
  --purple:#5c4f7a;--purple-l:#f0eef6;--purple-b:#c5bad9;
  --gray:#4b5563;--gray-l:#f5f5f5;--gray-b:#d1d5db;
  --orange:#7c5c3a;--orange-l:#f5f0ea;--orange-b:#d4b896;
  --teal:#3a6b6b;--teal-l:#eaf2f2;--teal-b:#a8c8c8;
  --pink:#7a4a5e;--pink-l:#f4eef1;--pink-b:#cdb0bc;
  --brown:#7a5c3a;--brown-l:#f5ede3;--brown-b:#d4b896;
  /* ── ベースカラー ── */
  --bg:#ffffff;
  --surface:#ffffff;
  --border:#e0ddd8;
  --border-light:#f0eeeb;
  --text-primary:#1c1c1a;
  --text-secondary:#5c5c58;
  --text-muted:#9c9c98;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:#fff;color:var(--text-primary);min-height:100vh;display:flex}

/* ── サイドバー ── */
.sidebar{width:196px;min-height:100vh;background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:20;transition:none}
.sidebar-resizer{position:absolute;top:0;right:-4px;width:8px;height:100%;cursor:col-resize;z-index:30;display:flex;align-items:center;justify-content:center}
.sidebar-resizer::after{content:'';width:3px;height:40px;background:var(--border);border-radius:2px;transition:background .15s}
.sidebar-resizer:hover::after,.sidebar-resizer.dragging::after{background:var(--text-muted)}
.sidebar-logo{padding:18px 16px 14px;border-bottom:1px solid var(--border-light)}
.logo-title{font-size:15px;font-weight:600;color:var(--text-primary);letter-spacing:.02em}
.logo-sub{font-size:11px;color:var(--text-muted);margin-top:2px}
.sidebar-nav{flex:1;padding:10px 8px;overflow-y:auto}
.nav-sec{font-size:10px;font-weight:600;color:var(--text-muted);letter-spacing:.07em;padding:0 8px;margin:10px 0 4px}
.nav-btn{display:flex;align-items:center;gap:8px;width:100%;padding:9px 10px;border:1px solid transparent;background:none;color:var(--text-secondary);font-size:13px;font-weight:500;cursor:pointer;border-radius:6px;font-family:inherit;text-align:left;transition:all .15s;margin-bottom:2px}
.nav-btn:hover{background:rgba(0,0,0,.04);color:var(--text-primary)}
.nav-btn.active{font-weight:600}
.nb-projects.active{background:#fff;color:var(--text-primary);border-color:var(--border)}
.nb-progress.active{background:#fff;color:var(--text-primary);border-color:var(--border)}



.nb-manage.active{background:#fff;color:var(--text-primary);border-color:var(--border)}
.nav-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0;opacity:.4}
.nav-btn.active .nav-dot{opacity:1}
.sidebar-footer{padding:10px 8px;border-top:1px solid var(--border-light)}
.sync-pill{font-size:11px;padding:4px 10px;border-radius:999px;font-weight:500;display:block;text-align:center;border:1.5px solid transparent}
.sync-ok{background:var(--green-l);color:var(--green);border-color:var(--green-b)}
.sync-err{background:var(--red-l);color:var(--red);border-color:var(--red-b)}
.sync-ing{background:var(--yellow-l);color:var(--yellow);border-color:var(--yellow-b)}
.save-flash{font-size:11px;color:var(--green);text-align:center;display:block;margin-top:4px;opacity:0;transition:opacity .3s;height:14px}
.save-flash.show{opacity:1}
.last-sync-txt{font-size:10px;color:#cbd5e1;text-align:center;display:block;margin-top:3px}

/* ── メイン ── */
.main{margin-left:196px;flex:1;min-width:0;transition:none}
.main-pane{display:none;padding:24px 28px}.main-pane.active{display:block}
.pane-title{font-size:18px;font-weight:600;margin-bottom:20px;color:var(--text-primary);letter-spacing:-.01em}

/* ── アラートバナー ── */
.alert-banner{background:var(--red-l);border:1.5px solid var(--red-b);border-radius:9px;padding:14px 16px;margin-bottom:18px}
.alert-banner-title{font-size:13px;font-weight:600;color:var(--red);margin-bottom:8px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.alert-item{font-size:12px;font-weight:600;color:var(--red);padding:3px 0;display:flex;align-items:center;gap:6px}
.alert-dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}

/* ── 案件ボード ── */
/* ── 案件ボード（カンバン） ── */
.view-toggle-wrap{display:flex;gap:4px;background:var(--border-light);border-radius:6px;padding:3px;flex-shrink:0}
.view-toggle-btn{padding:5px 12px;border:none;background:none;color:#64748b;font-size:12px;font-weight:500;cursor:pointer;border-radius:5px;font-family:inherit;transition:all .15s;display:flex;align-items:center;gap:4px}
.view-toggle-btn.active{background:var(--surface);color:var(--text-primary);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.proj-kanban{display:flex;gap:0;overflow-x:auto;padding-bottom:16px;align-items:flex-start;margin:0 -24px;padding-left:24px}
.proj-kanban::-webkit-scrollbar{height:6px}
.proj-kanban::-webkit-scrollbar-track{background:#f1f5f9}
.proj-kanban::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
.pk-col{min-width:210px;width:210px;flex-shrink:0;background:#f5f4f1;border-radius:8px;padding:0 0 8px;margin-right:10px}
.pk-col:last-child{margin-right:0}
.pk-col-hd{padding:12px 12px 8px;display:flex;align-items:center;justify-content:space-between;border-radius:10px 10px 0 0}
.pk-col-label{font-size:12px;font-weight:600;padding:4px 10px;border-radius:6px;white-space:nowrap}
.pk-col-cnt{font-size:11px;font-weight:600;color:#94a3b8;background:#fff;padding:1px 7px;border-radius:999px}
.pk-cards-inner{padding:0 8px}
.pk-card{background:var(--surface);border-radius:7px;padding:12px 13px;margin-bottom:7px;border:1px solid var(--border);transition:all .15s}
.pk-card:hover{box-shadow:0 3px 12px rgba(0,0,0,.08);border-color:var(--blue-b);transform:translateY(-1px)}
.pk-card-name{font-size:13px;font-weight:600;color:#0f172a;line-height:1.45;margin-bottom:2px}
.pk-card-client{font-size:11px;color:#94a3b8;margin-bottom:8px;padding-bottom:7px;border-bottom:1px solid #f5f5f5}
.pk-card-date-row{display:flex;align-items:center;gap:5px;margin-bottom:6px;flex-wrap:wrap}
.pk-card-date-lbl{font-size:10px;color:#94a3b8;font-weight:500}
.pk-card-date-val{font-size:11px;color:#374151;font-weight:500}
.pk-card-days{font-size:10px;font-weight:600;padding:2px 7px;border-radius:999px;white-space:nowrap}
.pk-card-info-grid{display:flex;flex-direction:column;gap:5px;margin:6px 0 2px}
.pk-info-row{display:flex;align-items:center;gap:6px}
.pk-info-label{font-size:10px;font-weight:600;color:#94a3b8;width:80px;flex-shrink:0}
.pk-info-val{font-size:12px;color:#374151;font-weight:500}
.pk-info-task-row{align-items:flex-start;gap:6px}
.pk-info-task-name{font-size:11px;color:#374151;line-height:1.45;flex:1}
.pk-card-bottom{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px}
.pk-prog-bar{height:4px;background:#f1f5f9;border-radius:2px;overflow:hidden}
.pk-prog-fill{height:100%;border-radius:2px;transition:width .4s}
.days-ok{background:var(--green-l);color:var(--green);border:1px solid var(--green-b)}
.days-warn{background:var(--yellow-l);color:var(--yellow);border:1px solid var(--yellow-b)}
.days-danger{background:var(--red-l);color:var(--red);border:1px solid var(--red-b)}
.days-none{background:#f1f5f9;color:#94a3b8;border:1px solid #e5e7eb}
.pk-card-people{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.pk-card-acts{display:flex;gap:4px}
.pk-act-btn{font-size:10px;padding:3px 8px;border:1px solid var(--border);border-radius:4px;background:var(--surface);color:var(--text-muted);cursor:pointer;font-family:inherit;transition:all .15s}
.pk-act-btn:hover{color:var(--text-primary);border-color:var(--text-muted)}
.pk-act-edit{color:var(--blue);border-color:var(--blue-b);background:var(--blue-l)}
.pk-act-del:hover{color:var(--red);border-color:var(--red-b);background:var(--red-l)}
/* 一覧形式 */
.proj-list-view{display:none}
.proj-list-view.active{display:block}
.proj-list-table{width:100%;border-collapse:collapse;font-size:13px;background:var(--surface);border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.proj-list-table th{background:var(--bg);padding:6px 8px;text-align:left;font-size:10px;font-weight:600;color:var(--text-muted);letter-spacing:.06em;border-bottom:1px solid var(--border);white-space:nowrap}
.proj-list-table td{padding:6px 8px;border-bottom:1px solid var(--border-light);vertical-align:middle}
.proj-list-table tr:last-child td{border-bottom:none}
.proj-list-table tr:hover td{background:rgba(0,0,0,.02)}
.type-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;white-space:nowrap}
.type-shot{background:var(--blue-l);color:var(--blue);border:1px solid var(--blue-b)}
.type-internal{background:var(--purple-l);color:var(--purple);border:1px solid var(--purple-b)}
.type-running{background:var(--green-l);color:var(--green);border:1px solid var(--green-b)}
.type-done{background:#f1f5f9;color:#94a3b8;border:1px solid #e5e7eb}
.pbc-btn{font-size:11px;padding:3px 9px;border:1px solid var(--border);border-radius:4px;background:var(--surface);color:var(--text-secondary);cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s}
.pbc-btn-prog{color:var(--teal);border-color:var(--teal-b);background:var(--teal-l)}
.pbc-btn-edit{color:var(--blue);border-color:var(--blue-b);background:var(--blue-l)}
.pbc-btn-del:hover{color:var(--red);border-color:var(--red-b);background:var(--red-l)}
/* 人マーク+名前チップ */
.person-name-chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;padding:3px 9px;border-radius:999px;white-space:nowrap;width:fit-content}
.pm-chip{background:var(--blue-l);color:var(--blue);border:1.5px solid var(--blue-b)}
.member-chip{background:var(--teal-l);color:var(--teal);border:1.5px solid var(--teal-b)}
/* 旧スタイル互換 */
.person-chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:#374151;background:#f8fafc;border:1px solid #e5e7eb;padding:3px 8px;border-radius:999px}
.person-icon{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0}
.icon-pm{background:var(--blue-l);color:var(--blue)}
.icon-member{background:var(--teal-l);color:var(--teal)}
.pbc-top{padding:14px 16px 10px;border-bottom:1px solid #f1f5f9}
.pbc-type-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.type-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px}
.type-shot{background:var(--blue-l);color:var(--blue);border:1px solid var(--blue-b)}
.type-internal{background:var(--purple-l);color:var(--purple);border:1px solid var(--purple-b)}
.type-running{background:var(--green-l);color:var(--green);border:1px solid var(--green-b)}
.type-done{background:#f1f5f9;color:#94a3b8;border:1px solid #e5e7eb}
.days-chip{font-size:10px;font-weight:600;padding:2px 8px;border-radius:999px}
.days-ok{background:var(--green-l);color:var(--green);border:1px solid var(--green-b)}
.days-warn{background:var(--yellow-l);color:var(--yellow);border:1px solid var(--yellow-b)}
.days-danger{background:var(--red-l);color:var(--red);border:1px solid var(--red-b)}
.days-none{background:#f1f5f9;color:#94a3b8;border:1px solid #e5e7eb}
.pbc-name{font-size:14px;font-weight:600;color:#0f172a;margin-bottom:2px}
.pbc-client{font-size:11px;color:#94a3b8}
.pbc-dates{font-size:11px;color:#64748b;margin-top:6px}
.pbc-people{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap}
.person-chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:#374151;background:#f8fafc;border:1px solid #e5e7eb;padding:3px 8px;border-radius:999px}
.person-icon{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0}
.icon-pm{background:var(--blue-l);color:var(--blue)}
.icon-member{background:var(--teal-l);color:var(--teal)}
.pbc-bottom{padding:12px 16px}
.prog-bar-sm{height:6px;background:#f1f5f9;border-radius:3px;overflow:hidden;margin-bottom:6px}
.prog-fill-sm{height:100%;border-radius:3px;transition:width .4s}
.pbc-prog-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.prog-status-sel{font-size:11px;padding:3px 6px;border:1.5px solid #e5e7eb;border-radius:5px;background:#fff;color:#374151;font-family:inherit;cursor:pointer;font-weight:500}
.pbc-actions{display:flex;gap:5px}
.pbc-btn{font-size:11px;padding:3px 9px;border:1.5px solid #e5e7eb;border-radius:5px;background:#fff;color:#64748b;cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s}
.pbc-btn:hover{border-color:#d1d5db;color:#374151}
.pbc-btn-prog{color:var(--teal);border-color:var(--teal-b);background:var(--teal-l)}
.pbc-btn-prog:hover{background:var(--teal);color:#fff}
.pbc-btn-edit{color:var(--blue);border-color:var(--blue-b);background:var(--blue-l)}
.pbc-btn-edit:hover{background:var(--blue);color:#fff}
.pbc-btn-del:hover{color:var(--red);border-color:var(--red-b);background:var(--red-l)}

/* ── 案件一覧フィルター ── */
.filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.filter-tabs{display:flex;gap:4px;background:var(--border-light);border-radius:7px;padding:3px}
.filter-tab{font-size:12px;font-weight:500;padding:5px 12px;border:none;background:none;color:var(--text-secondary);cursor:pointer;border-radius:5px;font-family:inherit;transition:all .15s;white-space:nowrap}
.filter-tab.active{background:var(--surface);color:var(--text-primary);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.add-proj-btn{font-size:12px;padding:6px 14px;border:1px solid var(--border);border-radius:5px;background:var(--surface);color:var(--text-secondary);cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s;white-space:nowrap}
.add-proj-btn:hover{background:rgba(0,0,0,.06);color:var(--text-primary)}

/* ── 進捗管理（一覧） ── */
.prog-all-grid{display:flex;flex-direction:column;gap:16px}
.prog-proj-card{background:var(--surface);border-radius:8px;border:1px solid var(--border);overflow:hidden}
.prog-proj-hd{padding:14px 18px;border-bottom:1px solid var(--border-light);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;cursor:pointer;user-select:none}
.prog-proj-hd:hover{background:rgba(0,0,0,.02)}
.prog-proj-info{flex:1;min-width:0}
.prog-proj-client{font-size:11px;color:#94a3b8;margin-bottom:2px}
.prog-proj-name{font-size:14px;font-weight:600;color:#0f172a}
.prog-proj-people{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap}
.prog-proj-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.prog-pct-lg{font-size:22px;font-weight:600}
.prog-collapse-icon{font-size:12px;color:#94a3b8;transition:transform .2s}
.prog-collapse-icon.open{transform:rotate(180deg)}
.prog-proj-body{padding:14px 18px;display:none}
.prog-proj-body.open{display:block}
.prog-bar-lg{height:6px;background:var(--border-light);border-radius:3px;overflow:hidden;margin:8px 0 4px}
.prog-fill-lg{height:100%;border-radius:4px;transition:width .5s}
.prog-kpi-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;margin-top:14px}
.prog-kpi-title{font-size:12px;font-weight:600;color:#374151}
.kpi-list{list-style:none}
.kpi-item{display:flex;align-items:center;gap:7px;padding:8px 0;border-bottom:1px solid var(--border-light)}
.kpi-item:last-child{border-bottom:none}
.kpi-item.done .kpi-txt{text-decoration:line-through;color:#94a3b8}
.kpi-chk{width:16px;height:16px;border:1.5px solid #d1d5db;border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .15s;cursor:pointer}
.kpi-item.done .kpi-chk{background:var(--green);border-color:var(--green);color:#eff5f1}
.kpi-txt{font-size:13px;color:var(--text-secondary);flex:1;cursor:pointer;line-height:1.4}
.kpi-edit-btn{font-size:11px;padding:2px 7px;border:1px solid var(--border);border-radius:4px;background:var(--surface);color:var(--text-muted);cursor:pointer;font-family:inherit;transition:all .15s;flex-shrink:0}
.kpi-edit-btn:hover{color:var(--blue);border-color:var(--blue-b);background:var(--blue-l)}
.kpi-del-btn{font-size:11px;padding:2px 7px;border:1px solid var(--border);border-radius:4px;background:var(--surface);color:var(--text-muted);cursor:pointer;font-family:inherit;transition:all .15s;flex-shrink:0}
.kpi-del-btn:hover{color:var(--red);border-color:var(--red-b);background:var(--red-l)}
.add-kpi-row{display:flex;gap:6px;margin-top:10px}
.add-kpi-inp{flex:1;font-size:13px;padding:6px 10px;border:1px solid var(--border);border-radius:5px;background:var(--surface);font-family:inherit;color:var(--text-primary);transition:border-color .15s}
.add-kpi-inp:focus{outline:none;border-color:var(--blue)}
.add-kpi-btn{font-size:12px;padding:6px 12px;border:1px solid var(--blue-b);border-radius:5px;background:var(--blue-l);color:var(--blue);cursor:pointer;font-family:inherit;font-weight:500;white-space:nowrap;transition:all .15s}
.add-kpi-btn:hover{background:var(--blue);color:#eef1f6}
.auto-toggle{display:flex;align-items:center;gap:6px;font-size:12px;color:#64748b;cursor:pointer;margin-top:10px}
.auto-toggle input{width:auto;margin-bottom:0}
.no-proj-msg{text-align:center;padding:48px;color:#94a3b8;font-size:13px}

/* ── タスク管理 ── */
.s-alert{--sc:var(--red);--sb:var(--red-b);--sl:var(--red-l)}
.s-estimate{--sc:var(--gray);--sb:var(--gray-b);--sl:var(--gray-l)}
.s-start{--sc:var(--blue);--sb:var(--blue-b);--sl:var(--blue-l)}
.s-wip{--sc:var(--purple);--sb:var(--purple-b);--sl:var(--purple-l)}
.s-review{--sc:var(--yellow);--sb:var(--yellow-b);--sl:var(--yellow-l)}
.s-fix{--sc:var(--orange);--sb:var(--orange-b);--sl:var(--orange-l)}
.s-deliver{--sc:var(--teal);--sb:var(--teal-b);--sl:var(--teal-l)}
.s-invoice{--sc:var(--pink);--sb:var(--pink-b);--sl:var(--pink-l)}
.s-done{--sc:var(--green);--sb:var(--green-b);--sl:var(--green-l)}
.group-wrap{margin-bottom:24px}
.group-hd{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.group-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:999px;background:var(--sl);color:var(--sc);border:1px solid var(--sb)}
.group-count{font-size:11px;color:#94a3b8}
.task-card{background:var(--surface);border-radius:7px;padding:13px 15px;margin-bottom:6px;border:1px solid var(--border);transition:box-shadow .15s;border-left:3px solid var(--sc)}
.task-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.06)}
.tc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:8px}
.tc-left{flex:1;min-width:0}
.tc-project{font-size:11px;color:#94a3b8;margin-bottom:3px}
.tc-name{font-size:14px;font-weight:600;color:#0f172a;line-height:1.4}
.tc-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.tc-badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:5px;border:1.5px solid var(--sb);background:var(--sl);color:var(--sc);cursor:pointer;white-space:nowrap;transition:opacity .15s}
.tc-badge:hover{opacity:.75}
.date-tag{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500;white-space:nowrap}
.dt-normal{background:#f1f5f9;color:#64748b;border:1px solid #e2e8f0}
.dt-over{background:var(--red-l);color:var(--red);border:1px solid var(--red-b)}
.dt-soon{background:var(--yellow-l);color:var(--yellow);border:1px solid var(--yellow-b)}
.subtask-list{list-style:none;margin:8px 0}
.subtask-item{display:grid;grid-template-columns:14px 1fr auto;gap:7px;align-items:start;padding:5px 0;border-bottom:1px solid #f8fafc;cursor:pointer}
.subtask-item:last-child{border-bottom:none}
.subtask-item.done .sub-txt{text-decoration:line-through;color:#cbd5e1}
.sub-chk{width:14px;height:14px;border:1px solid var(--border);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;margin-top:1px;transition:all .15s;flex-shrink:0}
.subtask-item.done .sub-chk{background:var(--green);border-color:var(--green);color:#fff}
.sub-body{display:flex;flex-direction:column;gap:3px;min-width:0}
.sub-txt{font-size:13px;color:#475569;line-height:1.4}
.sub-assignee{font-size:10px;color:#64748b;background:#f1f5f9;padding:1px 6px;border-radius:999px;display:inline-block;width:fit-content}
.sub-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.tc-prog{height:3px;background:#f1f5f9;border-radius:2px;overflow:hidden;margin-top:8px}
.tc-prog-fill{height:100%;border-radius:2px;background:var(--sc);transition:width .4s}
.tc-footer{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.tc-meta{font-size:11px;color:#94a3b8}
.tc-acts{display:flex;gap:4px}
.act-btn{font-size:11px;padding:3px 8px;border:1px solid var(--border);border-radius:4px;background:var(--surface);color:var(--text-muted);cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s}
.act-btn:hover{color:var(--text-primary);border-color:var(--text-muted)}
.act-edit:hover{color:var(--blue);border-color:var(--blue-b);background:var(--blue-l)}
.act-del:hover{color:var(--red);border-color:var(--red-b);background:var(--red-l)}

/* ── カレンダー ── */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-title-txt{font-size:16px;font-weight:600;color:#0f172a}
.cal-nav{border:1px solid var(--border);border-radius:5px;padding:5px 13px;cursor:pointer;font-size:12px;font-weight:500;color:var(--text-secondary);background:var(--surface);font-family:inherit;transition:all .15s}
.cal-nav:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-l)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:#e5e7eb;border:1px solid #e5e7eb;border-radius:10px;overflow:hidden}
.cal-dow{background:#f8fafc;padding:7px 4px;text-align:center;font-size:11px;font-weight:600;color:#94a3b8;letter-spacing:.04em}
.cal-day{background:#fff;min-height:90px;padding:5px}
.cal-day.other{background:#fafafa;opacity:.55}
.cal-day.today{background:#eff6ff}
.cal-day.has-tasks{cursor:pointer}
.cal-day.has-tasks:hover{background:#f5f3ff}
.cal-num{font-size:12px;font-weight:500;color:#94a3b8;margin-bottom:3px}
.cal-day.today .cal-num{color:var(--blue);font-weight:700}
.cal-chip{font-size:10px;padding:2px 5px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4;font-weight:500;background:var(--sl,#f1f5f9);color:var(--sc,#64748b)}
.chip-done{background:#f1f5f9!important;color:#94a3b8!important}
.cal-more{font-size:10px;color:#94a3b8;padding:1px 3px}
.cal-detail-item{padding:8px 0;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;gap:8px;font-size:13px}
.cal-detail-item:last-child{border-bottom:none}

/* ── フォーム ── */
.form-card{background:var(--surface);border-radius:8px;padding:20px;margin-bottom:12px;border:1px solid var(--border)}
.form-card-title{font-size:13px;font-weight:600;margin-bottom:14px;color:var(--text-primary);letter-spacing:.01em}
.form-label{font-size:11px;font-weight:600;color:var(--text-secondary);margin-bottom:5px;display:block;letter-spacing:.02em}
input[type=text],input[type=date],input[type=number],textarea,select{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:5px;background:var(--surface);color:var(--text-primary);font-size:13px;font-family:inherit;margin-bottom:10px;transition:border-color .15s}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 2px rgba(74,111,165,.12)}
textarea{resize:vertical;min-height:70px}
.nippo-out{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:14px;white-space:pre-wrap;font-size:13px;line-height:1.8;color:var(--text-secondary)}
.btn{padding:6px 15px;border:1px solid var(--border);border-radius:5px;background:var(--surface);color:var(--text-secondary);font-size:12px;cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s}
.btn:hover{border-color:var(--text-muted);background:rgba(0,0,0,.03)}
.btn-blue{border-color:var(--blue-b);color:var(--blue);background:var(--blue-l)}
.btn-blue:hover{background:var(--blue);color:#f0f4f8;border-color:var(--blue)}
.btn-green{border-color:var(--green-b);color:var(--green);background:var(--green-l)}
.btn-green:hover{background:var(--green);color:#eff5f1;border-color:var(--green)}
.btn-orange{border-color:var(--orange-b);color:var(--orange);background:var(--orange-l)}
.btn-orange:hover{background:var(--orange);color:#f5efe8;border-color:var(--orange)}
.btn-pink{border-color:var(--pink-b);color:var(--pink);background:var(--pink-l)}
.btn-pink:hover{background:var(--pink);color:#f4eef1;border-color:var(--pink)}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}

/* ── カルーセル ── */
.carousel-wrap{position:relative;margin-bottom:14px}
.carousel-track-outer{overflow:hidden;border-radius:8px}
.carousel-track{display:flex;transition:transform .3s ease}
.carousel-page{min-width:100%;display:flex;flex-wrap:wrap;gap:6px;padding:4px}
.master-tag{display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:4px 11px;border-radius:5px;border:1px solid var(--border);background:var(--surface);color:var(--text-secondary)}
.del-tag{background:none;border:none;color:#d1d5db;cursor:pointer;font-size:14px;line-height:1;padding:0;margin-left:2px;transition:color .15s}
.del-tag:hover{color:var(--red)}
.carousel-controls{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:10px}
.carousel-btn{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:4px 10px;cursor:pointer;font-size:12px;color:var(--text-secondary);transition:all .15s}
.carousel-btn:hover{border-color:var(--blue);color:var(--blue)}
.carousel-btn:disabled{opacity:.3;cursor:not-allowed}
.carousel-dots{display:flex;gap:5px}
.c-dot{width:6px;height:6px;border-radius:50%;background:#e5e7eb;transition:background .2s}
.c-dot.active{background:var(--blue)}

/* ── ツールバー ── */
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.sort-row{display:flex;align-items:center;gap:6px}
.sort-lbl{font-size:12px;color:#94a3b8;font-weight:500}
.sort-btn{font-size:11px;padding:4px 10px;border:1px solid var(--border);border-radius:5px;background:var(--surface);color:var(--text-secondary);cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s}
.sort-btn:hover{border-color:var(--blue);color:var(--blue)}
.sort-btn.active{background:var(--blue-l);color:var(--blue);border-color:var(--blue-b);font-weight:600}
.fsel{font-size:12px;padding:5px 10px;border:1.5px solid #e5e7eb;border-radius:6px;background:#fff;color:#64748b;font-family:inherit;font-weight:500;cursor:pointer}
.fsel:focus{outline:none;border-color:var(--blue)}

/* ── モーダル ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(10,10,10,.4);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.overlay.open{display:flex}
.modal{background:var(--surface);border-radius:10px;padding:24px;width:90%;max-width:560px;max-height:92vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.18)}
.modal-title{font-size:15px;font-weight:600;margin-bottom:18px;color:var(--text-primary);letter-spacing:-.01em}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.sub-edit-row{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px;margin-bottom:8px}
.sub-edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px}
.sub-edit-grid input,.sub-edit-grid select{margin-bottom:0}
.sub-edit-bottom{display:flex;align-items:center;gap:6px}
.sub-edit-bottom input[type=date]{margin-bottom:0;flex:1}
.rm-btn{background:none;border:1.5px solid var(--red-b);color:var(--red);cursor:pointer;font-size:12px;padding:3px 8px;border-radius:5px;font-family:inherit;font-weight:500;white-space:nowrap}
.rm-btn:hover{background:var(--red-l)}
.info-box{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:12px;font-size:12px;color:var(--text-secondary);line-height:1.8}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.stat{background:var(--surface);border-radius:7px;padding:14px 16px;border:1px solid var(--border);position:relative;overflow:hidden}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.stat-a::before{background:var(--blue)}.stat-b::before{background:var(--purple)}.stat-c::before{background:var(--green)}.stat-d::before{background:var(--red)}
.stat-num{font-size:24px;font-weight:600;line-height:1}
.stat-lbl{font-size:11px;color:var(--text-muted);margin-top:4px;font-weight:500}
.loading{text-align:center;padding:48px;color:#94a3b8;font-size:13px}

/* ── モバイル ── */
.mobile-header{display:none}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:19}

/* ── スマホ専用UI ── */
.sp-shell{display:none}
@media(max-width:720px){
  /* PCレイアウト全非表示 */
  .sidebar{display:none}
  .main{display:none}
  /* スマホシェル表示 */
  .sp-shell{display:flex;flex-direction:column;min-height:100vh;background:#f7f7f5}
}

/* スマホヘッダー */
.sp-header{background:#fff;border-bottom:1px solid var(--border);padding:13px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20}
.sp-header-title{font-size:15px;font-weight:600;color:#0f172a}
.sp-sync{font-size:10px;padding:2px 8px;border-radius:999px;font-weight:500;border:1.5px solid transparent}

/* スマホタブバー（下固定） */
.sp-tabbar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);display:flex;z-index:20;padding-bottom:env(safe-area-inset-bottom)}
.sp-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px 6px;border:none;background:none;cursor:pointer;font-family:inherit;font-size:10px;font-weight:500;color:#94a3b8;gap:3px;transition:color .15s}
.sp-tab.active{color:var(--text-primary)}
.sp-tab-icon{font-size:20px;line-height:1}
.sp-tab svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* スマホコンテンツ */
.sp-content{flex:1;overflow-y:auto;padding:16px 14px 24px}
.sp-pane{display:none}
.sp-pane.active{display:block}

/* スマホ案件カード */
.sp-proj-card{background:#fff;border-radius:8px;padding:14px 15px;margin-bottom:10px;border:1px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.04)}
.sp-proj-card:active{background:#f8fafc}
.sp-proj-name{font-size:14px;font-weight:700;color:#0f172a;margin-bottom:2px;line-height:1.4}
.sp-proj-client{font-size:11px;color:#94a3b8;margin-bottom:10px}
.sp-proj-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.sp-proj-label{font-size:10px;font-weight:600;color:#94a3b8}
.sp-proj-val{font-size:12px;font-weight:500;color:#374151}
.sp-proj-task{font-size:12px;color:#374151;background:#f1f5f9;border-left:3px solid var(--blue);padding:6px 10px;border-radius:0 6px 6px 0;margin:8px 0 10px;line-height:1.4}
.sp-proj-task-label{font-size:9px;font-weight:700;color:var(--blue);margin-bottom:2px}
.sp-prog-bar{height:5px;background:#f1f5f9;border-radius:3px;overflow:hidden;margin-top:6px}
.sp-prog-fill{height:100%;border-radius:3px;transition:width .4s}
.sp-section-title{font-size:13px;font-weight:700;color:#0f172a;margin-bottom:10px}
.sp-filter-scroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px}
.sp-filter-scroll::-webkit-scrollbar{display:none}
.sp-filter-chip{font-size:12px;font-weight:500;padding:5px 14px;border-radius:999px;border:1.5px solid #e5e7eb;background:#fff;color:#64748b;cursor:pointer;white-space:nowrap;font-family:inherit;flex-shrink:0;transition:all .15s}
.sp-filter-chip.active{background:var(--blue);color:#eef1f6;border-color:var(--blue)}

/* スマホ進捗管理 */
.sp-prog-card{background:#fff;border-radius:8px;margin-bottom:10px;border:1px solid var(--border);overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.sp-prog-hd{padding:13px 15px;display:flex;align-items:flex-start;justify-content:space-between;cursor:pointer;gap:10px}
.sp-prog-hd:active{background:#f8fafc}
.sp-prog-info{flex:1;min-width:0}
.sp-prog-client{font-size:10px;color:#94a3b8;margin-bottom:1px}
.sp-prog-name{font-size:14px;font-weight:700;color:#0f172a;margin-bottom:4px}
.sp-prog-meta{font-size:11px;color:#64748b}
.sp-prog-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.sp-prog-pct{font-size:20px;font-weight:700}
.sp-prog-chevron{font-size:11px;color:#94a3b8;transition:transform .2s}
.sp-prog-chevron.open{transform:rotate(180deg)}
.sp-prog-body{display:none;padding:0 15px 14px}
.sp-prog-body.open{display:block}
.sp-kpi-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #f8fafc;cursor:pointer}
.sp-kpi-item:last-child{border-bottom:none}
.sp-kpi-item.done .sp-kpi-txt{text-decoration:line-through;color:#94a3b8}
.sp-kpi-chk{width:20px;height:20px;border:2px solid #d1d5db;border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .15s;margin-top:1px}
.sp-kpi-item.done .sp-kpi-chk{background:var(--green);border-color:var(--green);color:#fff}
.sp-kpi-txt{font-size:13px;color:#374151;line-height:1.5;flex:1}
/* ── ガントチャート ── */
.gantt-wrap{margin-top:18px;border-top:1px solid var(--border-light);padding-top:14px}
.gantt-title{font-size:12px;font-weight:600;color:#374151;margin-bottom:10px}
.gantt-table{width:100%;border-collapse:collapse;font-size:11px}
.gantt-label{width:150px;min-width:150px;max-width:150px;padding:4px 10px 4px 0;color:var(--text-secondary);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;vertical-align:middle;font-size:12px;border-right:2px solid var(--border);position:sticky;left:0;background:#fff;z-index:2}
.gantt-label.done-label{color:var(--text-muted);text-decoration:line-through}
.gantt-label-inner{display:flex;align-items:center;gap:5px}
.gantt-chk{width:13px;height:13px;border-radius:3px;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;font-size:9px}
.gantt-chk-done{background:var(--green);color:#fff}
.gantt-chk-pending{border:1.5px solid var(--border)}
.gantt-bar-cell{padding:3px 0;vertical-align:middle}
.gantt-month-hd{text-align:center;padding:3px 4px;font-size:10px;font-weight:600;color:#94a3b8;border-bottom:1px solid #e5e7eb;white-space:nowrap}
.gantt-day-cell{width:28px;min-width:28px;height:20px;border-right:1px solid #f1f5f9;vertical-align:middle;padding:0}
.gantt-day-cell.today-col{background:#eff6ff}
.gantt-day-cell.weekend{background:#fafafa}
.gantt-bar{height:14px;border-radius:3px;margin:3px 0;transition:opacity .15s}
.gantt-bar:hover{opacity:.8;cursor:pointer}
.gantt-bar-done{background:var(--green);opacity:.55}
.gantt-bar-active{background:var(--blue);opacity:.85}
.gantt-bar-pending{background:#e5e7eb}
.gantt-proj-bar{height:10px;border-radius:2px;background:var(--purple);opacity:.4}
.gantt-today-line{position:relative}
.gantt-today-line::after{content:'今日';position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--blue);font-weight:600;white-space:nowrap}

/* ── 案件詳細モーダル ── */
.proj-detail-section{margin-bottom:14px}
.proj-detail-label{font-size:11px;font-weight:600;color:#94a3b8;letter-spacing:.05em;margin-bottom:5px}
.proj-detail-value{font-size:13px;color:#0f172a}
.proj-detail-chips{display:flex;flex-wrap:wrap;gap:5px}

/* ── 進捗管理ヘッダーメタ情報 ── */
.prog-meta-row{display:flex;align-items:center;gap:10px;margin-top:8px;flex-wrap:wrap}
.prog-meta-item{display:flex;align-items:center;gap:5px}
.prog-meta-label{font-size:10px;font-weight:600;color:#94a3b8;letter-spacing:.03em}
.prog-meta-val{font-size:12px;font-weight:500;color:#374151}
.prog-meta-sep{color:#e5e7eb;font-size:12px}

/* ── 進捗管理 タブ切り替え ── */
.prog-tab-bar{display:flex;gap:0;border-bottom:2px solid #e5e7eb;margin-bottom:14px;margin-top:14px}
.prog-tab-btn{padding:6px 14px;font-size:12px;font-weight:500;border:none;background:none;color:var(--text-muted);cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.prog-tab-btn:hover{color:var(--text-secondary)}
.prog-tab-btn.active{color:var(--text-primary);border-bottom-color:var(--text-primary);font-weight:600}
.prog-tab-pane{display:none}
.prog-tab-pane.active{display:block}

/* ── KPIテンプレート ── */
.kpi-tmpl-row{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
.kpi-tmpl-btn{font-size:11px;padding:3px 10px;border:1px solid var(--border);border-radius:4px;background:var(--surface);color:var(--text-secondary);cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s;white-space:nowrap}
.kpi-tmpl-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-l)}

/* ── KPI納期バッジ ── */
.kpi-date-badge{font-size:10px;font-weight:500;padding:2px 7px;border-radius:4px;border:1px solid var(--border);color:var(--text-muted);background:var(--surface);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s;font-family:inherit}
.kpi-date-badge:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-l)}
.kpi-date-badge.overdue{border-color:var(--red-b);color:var(--red);background:var(--red-l)}
.kpi-date-badge.soon{border-color:var(--brown-b);color:var(--brown);background:var(--brown-l)}
.kpi-date-badge.warn{border-color:var(--yellow-b);color:var(--yellow);background:var(--yellow-l)}
.kpi-date-badge.normal{border-color:var(--green-b);color:var(--green);background:var(--green-l)}
.kpi-date-badge.no-date{border-style:dashed;color:var(--text-muted)}
.kpi-date-badge.no-date:hover{border-color:var(--blue);color:var(--blue);border-style:solid;background:var(--blue-l)}

.sales-chip{background:var(--orange-l);color:var(--orange);border:1.5px solid var(--orange-b)}
.pm-mgr-chip{background:var(--purple-l);color:var(--purple);border:1.5px solid var(--purple-b)}

/* ── 進捗管理 切り替えボタン ── */
.prog-tab-wrap{display:flex;align-items:flex-end;gap:0;border-bottom:2px solid var(--border-light)}
.prog-type-btn{display:flex;align-items:baseline;gap:7px;padding:10px 20px 12px;border:none;border-bottom:2px solid transparent;margin-bottom:-2px;background:none;cursor:pointer;font-family:inherit;transition:all .18s;color:var(--text-muted)}
.prog-type-btn:hover{color:var(--text-secondary)}
.prog-type-btn.active{border-bottom-color:var(--text-primary);color:var(--text-primary)}
.prog-type-label{font-size:14px;font-weight:600;letter-spacing:.01em}
.prog-type-count{font-size:12px;font-weight:500;background:var(--border-light);border-radius:999px;padding:1px 8px;transition:all .18s}
.prog-type-btn.active .prog-type-count{background:var(--text-primary);color:#fff}

/* ── マスター一覧 ── */
.master-list-grid{display:flex;flex-wrap:wrap;gap:8px}
.master-item{display:flex;align-items:center;gap:6px;padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface);font-size:13px;color:var(--text-primary)}
.master-item-name{flex:1}
.master-item-edit{font-size:11px;padding:2px 8px;border:1px solid var(--blue-b);border-radius:4px;background:var(--blue-l);color:var(--blue);cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s}
.master-item-edit:hover{background:var(--blue);color:#fff}
.master-item-del{font-size:11px;padding:2px 8px;border:1px solid var(--border);border-radius:4px;background:var(--surface);color:var(--text-muted);cursor:pointer;font-family:inherit;transition:all .15s}
.master-item-del:hover{color:var(--red);border-color:var(--red-b);background:var(--red-l)}

</style>
</head>

const STATUSES=[

const PROG_PCT={'0':0,'20':20,'40':40,'60':60,'80':80,'100':100,'complete':100,'maintenance':100};

let tasks=[], projects=[], assignees=[], projItems=[], kpiData={};
let projViewMode='kanban';
let currentSort='status', projFilter='all';
let calYear=new Date().getFullYear(), calMonth=new Date().getMonth();
const carouselIdx={client:0,assignee:0};
const ITEMS_PER_PAGE=18;
const collapsedProjs=new Set(); // 折り畳み状態管理

// ─── Sync UI ───
function setSS(s){
  ['sync-status','sync-status-m'].forEach(id=>{
    const el=document.getElementById(id);if(!el)return;
    el.className='sync-pill';
    if(s==='ok'){el.classList.add('sync-ok');el.textContent='同期済';}
    if(s==='err'){el.classList.add('sync-err');el.textContent='エラー';}
    if(s==='ing'){el.classList.add('sync-ing');el.textContent='同期中';}
  });
}
function flash(){const el=document.getElementById('save-flash');el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),1800);}

// ─── Meta ───
async function loadMeta(){
  try{const snap=await getDoc(doc(db,'meta','config'));if(snap.exists()){const d=snap.data();projects=d.projects||[];assignees=d.assignees||[];}}catch(e){}
  renderMeta();
}
async function saveMeta(){try{await setDoc(doc(db,'meta','config'),{projects,assignees});}catch(e){}}

// ─── proj_items ───
onSnapshot(collection(db,'proj_items'),snap=>{
  projItems=[];snap.forEach(d=>projItems.push(d.data()));
  projItems.sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));
  renderProjects();renderProgressAll();renderAlerts();spRefresh();if(document.getElementById('pane-dash')?.classList.contains('active'))renderDash();
  setSS('ok');document.getElementById('last-sync').textContent=new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})+' 更新';
},()=>setSS('err'));

// ─── kpi_data ───
onSnapshot(collection(db,'kpi_data'),snap=>{
  kpiData={};snap.forEach(d=>{const dt=d.data();kpiData[dt.projId]=dt;});
  syncKpiToProj();renderProgressAll();renderAlerts();
  // ②カードの対応中タスクをリアルタイム反映
  renderProjects();spRefresh();
},()=>{});

// tasks_v2 は別ツールへ移行

async function saveProjItem(p){setSS('ing');try{await setDoc(doc(db,'proj_items',p.id),p);flash();}catch{setSS('err');}}
async function delProjItem(id){setSS('ing');try{await deleteDoc(doc(db,'proj_items',id));}catch{setSS('err');}}

async function saveTask(t){/* 別ツールへ移行 */}

// ─── ユーティリティ ───
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtD(d){if(!d)return'';try{const dt=new Date(d+'T00:00:00');return`${dt.getMonth()+1}/${dt.getDate()}`;}catch{return d;}}
function fmtDFull(d){if(!d)return'−';try{const dt=new Date(d+'T00:00:00');return`${dt.getFullYear()}/${dt.getMonth()+1}/${dt.getDate()}`;}catch{return d;}}
function isOver(d){if(!d)return false;try{return new Date(d+'T23:59:59')<new Date();}catch{return false;}}
function isSoon(d){if(!d)return false;try{const diff=(new Date(d+'T23:59:59')-new Date())/864e5;return diff>=0&&diff<=3;}catch{return false;}}
function dtCls(d){return isOver(d)?'dt-over':isSoon(d)?'dt-soon':'dt-normal';}
function calcSubProg(t){const s=t.subtasks||[];return s.length?Math.round(s.filter(x=>x.done).length/s.length*100):0;}
function sCls(id){return ST[id]?.cls||'s-wip';}
function sLbl(id){return ST[id]?.label||id;}
function progColor(pct){if(pct>=80)return'var(--green)';if(pct>=40)return'var(--blue)';if(pct>0)return'var(--yellow)';return'#e5e7eb';}

// 日本の祝日リスト（2025〜2027年）
const JP_HOLIDAYS=new Set([
  // 2025
  '2025-01-01','2025-01-13','2025-02-11','2025-02-23','2025-02-24',
  '2025-03-20','2025-04-29','2025-05-03','2025-05-04','2025-05-05','2025-05-06',
  '2025-07-21','2025-08-11','2025-09-15','2025-09-22','2025-09-23',
  '2025-10-13','2025-11-03','2025-11-23','2025-11-24',
  // 2026
  '2026-01-01','2026-01-12','2026-02-11','2026-02-23',
  '2026-03-20','2026-04-29','2026-05-03','2026-05-04','2026-05-05','2026-05-06',
  '2026-07-20','2026-08-11','2026-09-21','2026-09-22','2026-09-23',
  '2026-10-12','2026-11-03','2026-11-23',
  // 2027
  '2027-01-01','2027-01-11','2027-02-11','2027-02-23',
  '2027-03-21','2027-03-22','2027-04-29','2027-05-03','2027-05-04','2027-05-05',
  '2027-07-19','2027-08-11','2027-09-20','2027-09-23',
  '2027-10-11','2027-11-03','2027-11-23',
]);
function isHoliday(d){
  const s=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  return JP_HOLIDAYS.has(s);
}
function isWorkday(d){const w=d.getDay();return w!==0&&w!==6&&!isHoliday(d);}
function workdaysLeft(endDate){
  if(!endDate)return null;
  const end=new Date(endDate+'T23:59:59'),now=new Date();
  if(end<now)return -1;
  let count=0,cur=new Date(now);cur.setHours(0,0,0,0);
  while(cur<=end){if(isWorkday(cur))count++;cur.setDate(cur.getDate()+1);}
  return count;
}
function workdaysBetween(start,end){
  if(!start||!end)return 0;
  try{let count=0,cur=new Date(start+'T00:00:00');const endDt=new Date(end+'T23:59:59');
    while(cur<=endDt){if(isWorkday(cur))count++;cur.setDate(cur.getDate()+1);}return count;}catch{return 0;}
}
function calcKpiPct(projId){
  const kpi=kpiData[projId];if(!kpi||!kpi.items||!kpi.items.length)return null;
  const total=kpi.items.reduce((s,k)=>s+(k.weight||1),0);
  const done=kpi.items.filter(k=>k.done).reduce((s,k)=>s+(k.weight||1),0);
  return total>0?Math.round(done/total*100):0;
}
function pctToProgStatus(pct){
  if(pct>=100)return'complete';if(pct>=80)return'100';if(pct>=60)return'80';
  if(pct>=40)return'60';if(pct>=20)return'40';if(pct>0)return'20';return'0';
}
function syncKpiToProj(){
  projItems.forEach(p=>{
    if(p.autoProgress===false)return; // falseの場合のみスキップ（未設定=true扱い）
    const pct=calcKpiPct(p.id);if(pct===null)return;
    const ns=pctToProgStatus(pct);
    if(p.progStatus!==ns){p.progStatus=ns;setDoc(doc(db,'proj_items',p.id),p).catch(()=>{});}
  });
}

// ─── 担当者アイコンHTML ───
function initials(name){return(name||'').slice(0,2)||'?';}function salesChip(name){

  return`<span class="person-name-chip sales-chip">${personSvgIcon(12)}${esc(name)}</span>`;
}
function pmMgrChip(name){

}

function pmChip(name){

}
function memberChip(name){

  return`<span class="person-name-chip member-chip">${personSvgIcon(12)}${esc(name)}</span>`;
}

// ─── アラート ───
let alertTab='critical'; // 'critical' | 'warning'
function renderAlerts(){
  const area=document.getElementById('proj-alert-area');if(!area)return;
  const critical=[],warnings=[];
  projItems.forEach(p=>{
    if(p.type==='done'||p.progStatus==='complete'||p.progStatus==='maintenance')return;
    const kpiPct=calcKpiPct(p.id);
    const ep=kpiPct!==null?kpiPct:(PROG_PCT[p.progStatus||'0']||0);
    const days=workdaysLeft(p.endDate);
    const label=`${p.client?p.client+' / ':''}${p.name||'不明'}`;
    if(days===-1){critical.push(`「${label}」納品期限を過ぎています（進捗${ep}%）`);return;}
    if(days!==null&&days<=5&&ep<70)critical.push(`「${label}」残${days}日・進捗${ep}%`);
    else if(days!==null&&days<=10&&ep<50)warnings.push(`「${label}」残${days}日・進捗${ep}%`);
  });
  if(!critical.length&&!warnings.length){area.innerHTML='';return;}
  // 緊急0件なら自動的に注意タブ表示
  if(!critical.length&&alertTab==='critical')alertTab='warning';
  if(!warnings.length&&alertTab==='warning')alertTab='critical';

  const makeItem=(a,color)=>`<div class="alert-item" style="color:${color}"><span class="alert-dot" style="background:${color}"></span>${esc(a)}</div>`;
  const items=alertTab==='critical'
    ?critical.map(a=>makeItem(a,'var(--red)'))
    :warnings.map(a=>makeItem(a,'var(--brown)'));

  const critBtn=`<button onclick="switchAlertTab('critical')" style="font-size:10px;padding:2px 8px;border-radius:999px;border:none;cursor:pointer;font-family:inherit;font-weight:600;transition:all .15s;${alertTab==='critical'?'background:var(--red);color:#fff':'background:var(--red-l);color:var(--red)'}">緊急 ${critical.length}件</button>`;
  const warnBtn=`<button onclick="switchAlertTab('warning')" style="font-size:10px;padding:2px 8px;border-radius:999px;border:none;cursor:pointer;font-family:inherit;font-weight:600;transition:all .15s;${alertTab==='warning'?'background:var(--brown);color:#fff':'background:var(--brown-l);color:var(--brown);border:1px solid var(--brown-b)'}">注意 ${warnings.length}件</button>`;

  area.innerHTML=`<div class="alert-banner">
    <div class="alert-banner-title">要注意案件</div>
    <div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap">
      ${critical.length?critBtn:''}
      ${warnings.length?warnBtn:''}
    </div>
    ${items.length?items.join(''):'<div class="alert-item" style="color:var(--text-muted)">該当案件なし</div>'}
  </div>`;
}

// 今月・来月判定ユーティリティ
function isThisMonth(dateStr){
  if(!dateStr)return false;
  const d=new Date(dateStr+'T00:00:00'),now=new Date();
  return d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth();
}
function isNextMonth(dateStr){
  if(!dateStr)return false;
  const d=new Date(dateStr+'T00:00:00'),now=new Date();
  const ny=now.getMonth()===11?now.getFullYear()+1:now.getFullYear();
  const nm=now.getMonth()===11?0:now.getMonth()+1;
  return d.getFullYear()===ny&&d.getMonth()===nm;
}

function renderProjects(){
  let list=[...projItems];
  // フィルター
  if(['shot','internal','running','done'].includes(projFilter)){
    list=list.filter(p=>p.type===projFilter);
  } else if(projFilter==='this_month'){
    list=list.filter(p=>isThisMonth(p.endDate));
  } else if(projFilter==='next_month'){
    list=list.filter(p=>isNextMonth(p.endDate));
  } else if(projFilter==='unpaid'){
    list=list.filter(p=>!p.billing||p.billing==='unpaid');
  } else if(projFilter==='half_paid'){
    list=list.filter(p=>p.billing==='half_paid');
  } else if(projFilter==='full_paid'){
    list=list.filter(p=>p.billing==='full_paid');
  }

  // カンバン形式
  renderKanban(list);
  // 一覧形式
  renderListView(list);
}

function getLatestKpiTask(projId){
  // 進捗管理から現在対応中のタスクを取得
  // ロジック: 未完了のタスクのうち最初のもの
  // → 全完了なら最後のタスク名を返す（完了済みとして表示）
  const kpi = kpiData[projId];
  if(!kpi||!kpi.items||!kpi.items.length) return null;
  const pending = kpi.items.filter(k=>!k.done);
  if(pending.length) return pending[0].text;
  // 全完了
  return kpi.items[kpi.items.length-1].text;
}

// ─── マスター管理 ───
let masterEditTarget={type:'',oldVal:''};

window.openAddMaster=(type)=>{
  masterEditTarget={type,oldVal:''};
  const label=type==='client'?'クライアント名':'担当者名';
  const val=prompt(`新しい${label}を入力してください`);
  if(!val||!val.trim())return;
  const v=val.trim();
  if(type==='client'){if(projects.includes(v)){alert('すでに登録されています');return;}projects.push(v);}
  else{if(assignees.includes(v)){alert('すでに登録されています');return;}assignees.push(v);}
  saveMeta();renderMeta();
};

window.openEditMaster=(type,oldVal)=>{
  const label=type==='client'?'クライアント名':'担当者名';
  const newVal=prompt(`${label}を編集してください`,oldVal);
  if(newVal===null||!newVal.trim())return;
  const v=newVal.trim();
  if(type==='client'){
    const idx=projects.indexOf(oldVal);
    if(idx<0)return;
    if(projects.includes(v)&&v!==oldVal){alert('すでに登録されています');return;}
    projects[idx]=v;
    // 案件データのクライアント名も更新
    projItems.forEach(p=>{if(p.client===oldVal){p.client=v;saveProjItem(p);}});
  }else{
    const idx=assignees.indexOf(oldVal);
    if(idx<0)return;
    if(assignees.includes(v)&&v!==oldVal){alert('すでに登録されています');return;}
    assignees[idx]=v;
    // 案件の担当者名も更新
    projItems.forEach(p=>{
      if(p.sales===oldVal){p.sales=v;saveProjItem(p);}
      if(p.pm===oldVal){p.pm=v;saveProjItem(p);}
      if(p.members){p.members=p.members.map(m=>m===oldVal?v:m);saveProjItem(p);}
    });
  }
  saveMeta();renderMeta();
};

function renderDash(){
  const grid=document.getElementById('dash-client-grid');
  if(!grid)return;
  // クライアントごとにグループ化
  const clientMap={};
  projItems.forEach(p=>{
    if(!p.client)return;
    if(!clientMap[p.client])clientMap[p.client]={projects:[],members:new Set()};
    clientMap[p.client].projects.push(p);
    if(p.pm)clientMap[p.client].members.add(p.pm);
    if(p.sales)clientMap[p.client].members.add(p.sales);
    (p.members||[]).forEach(m=>clientMap[p.client].members.add(m));
  });

  const clients=Object.entries(clientMap);
  if(!clients.length){grid.innerHTML='<div class="loading">案件がありません</div>';return;}

  grid.innerHTML=clients.map(([client,data])=>{
    const projs=data.projects;
    const activeProjs=projs.filter(p=>p.type!=='done'&&p.progStatus!=='complete');
    const members=[...data.members];
    const avgPct=projs.length?Math.round(projs.reduce((s,p)=>{
      const kpiPct=calcKpiPct(p.id);
      return s+(kpiPct!==null?kpiPct:(PROG_PCT[p.progStatus||'0']||0));
    },0)/projs.length):0;
    const memberChips=members.map(m=>`<span class="person-name-chip member-chip" style="font-size:10px;padding:2px 7px">${personSvgIcon(11)}${esc(m)}</span>`).join('');
    return`<div class="form-card" style="cursor:default">
      <div style="font-size:15px;font-weight:700;color:var(--text-primary);margin-bottom:4px">${esc(client)}</div>
      <div style="font-size:11px;color:var(--text-muted);margin-bottom:10px">進行中 ${activeProjs.length}件 / 全 ${projs.length}件</div>
      <div style="margin-bottom:10px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
          <div style="flex:1;height:6px;background:var(--border-light);border-radius:3px;overflow:hidden"><div style="width:${avgPct}%;height:100%;background:${progColor(avgPct)};border-radius:3px"></div></div>
          <span style="font-size:13px;font-weight:700;color:${progColor(avgPct)}">${avgPct}%</span>
        </div>
        <div style="font-size:10px;color:var(--text-muted)">平均進捗</div>
      </div>
      ${members.length?`<div style="margin-bottom:10px">
        <div style="font-size:10px;font-weight:600;color:var(--text-muted);margin-bottom:5px">メンバー</div>
        <div style="display:flex;flex-wrap:wrap;gap:4px">${memberChips}</div>
      </div>`:''}
      <div style="border-top:1px solid var(--border-light);padding-top:8px">
        ${projs.map(p=>{
          const kpiPct=calcKpiPct(p.id);
          const pct=kpiPct!==null?kpiPct:(PROG_PCT[p.progStatus||'0']||0);
          return`<div style="display:flex;align-items:center;justify-content:space-between;padding:4px 0;font-size:12px">
            <span style="color:var(--text-secondary)">${esc(p.name)}</span>
            <span style="font-weight:600;color:${progColor(pct)}">${pct}%</span>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

// ─── ガントチャート生成 ───
function buildGantt(p, kpiItems){
  if(!p.startDate && !p.endDate){
    return '<div style="font-size:11px;color:#94a3b8;margin-top:14px;padding:8px;background:#f8fafc;border-radius:6px">ガントチャートを表示するには案件の制作開始日・納品予定日を設定してください。</div>';
  }

  const now = new Date();
  const dStr = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const todayStr = dStr(now);

  // 表示範囲：案件開始月 〜 全タスクで最も遅い終了日 or 案件終了日（+1ヶ月）
  const projStart = p.startDate ? new Date(p.startDate+'T00:00:00') : new Date(now.getFullYear(), now.getMonth(), 1);
  let latestEnd = p.endDate ? new Date(p.endDate+'T00:00:00') : new Date(projStart.getFullYear(), projStart.getMonth()+3, 0);
  kpiItems.forEach(k=>{
    if(k.endDate){const d=new Date(k.endDate+'T00:00:00');if(d>latestEnd)latestEnd=d;}
  });

  let rangeStart = new Date(projStart.getFullYear(), projStart.getMonth(), 1);
  let rangeEnd   = new Date(latestEnd.getFullYear(), latestEnd.getMonth()+1, 0);
  // 最大12ヶ月
  const maxEnd = new Date(rangeStart.getFullYear(), rangeStart.getMonth()+12, 0);
  if(rangeEnd > maxEnd) rangeEnd = maxEnd;

  const days=[];
  const cur=new Date(rangeStart);
  while(cur<=rangeEnd){days.push(new Date(cur));cur.setDate(cur.getDate()+1);}
  if(!days.length)return '';

  const projStartStr = p.startDate||dStr(projStart);
  const projEndStr   = p.endDate||null;

  // 月ヘッダー
  let mM=-1,mY=-1,mCnt=0;
  const mGroups=[];
  days.forEach(d=>{
    if(d.getMonth()!==mM||d.getFullYear()!==mY){
      if(mCnt>0)mGroups[mGroups.length-1].count=mCnt;
      mGroups.push({label:`${d.getFullYear()}/${d.getMonth()+1}`,count:0});
      mM=d.getMonth();mY=d.getFullYear();mCnt=0;
    }
    mCnt++;
  });
  if(mGroups.length)mGroups[mGroups.length-1].count=mCnt;
  const monthCols=mGroups.map(mg=>`<th class="gantt-month-hd" colspan="${mg.count}">${mg.label}</th>`).join('');

  // 日付ヘッダー
  const dayCols=days.map(d=>{
    const isToday=dStr(d)===todayStr;
    const isWE=d.getDay()===0||d.getDay()===6;
    return`<th class="gantt-day-cell${isToday?' today-col':isWE?' weekend':''}" style="font-size:9px;font-weight:${isToday?700:400};color:${isToday?'var(--blue)':'#c0c0c0'};padding:2px 0;text-align:center">${d.getDate()}</th>`;
  }).join('');

  // バーセル生成ユーティリティ
  function makeCells(startStr, endStr, barClass, accent){
    return days.map(d=>{
      const ds=dStr(d);
      const inRange=startStr&&endStr&&ds>=startStr&&ds<=endStr;
      const isToday=ds===todayStr;
      const isWE=d.getDay()===0||d.getDay()===6;
      const bg=isToday?'rgba(37,99,235,.05)':isWE?'#fafafa':'#fff';
      let bar='';
      if(inRange){
        const isFirst=ds===startStr,isLast=ds===endStr;
        const r=isFirst&&isLast?'3px':isFirst?'3px 0 0 3px':isLast?'0 3px 3px 0':'0';
        bar=`<div class="${barClass}" style="margin:0 1px;border-radius:${r}${accent?';background:'+accent:''}"></div>`;
      }
      // 今日のライン
      const todayLine=isToday?'border-left:2px solid var(--blue);':'';
      return`<td class="gantt-day-cell" style="background:${bg};padding:2px 0;${todayLine}">${bar}</td>`;
    }).join('');
  }

  // 案件全体バー行
  const projRow=`<tr>
    <td class="gantt-label" style="font-weight:700;color:var(--purple);font-size:12px"><div class="gantt-label-inner"><span style="width:10px;height:10px;border-radius:2px;background:var(--purple-l);border:1px solid var(--purple-b);flex-shrink:0;display:inline-block"></span><span>案件全体</span></div></td>
    ${makeCells(projStartStr,projEndStr,'gantt-proj-bar',null)}
  </tr>`;

  // KPI行 - 全タスクを表示（日付未設定はバーなし・名前のみ）
  const kpiRows = kpiItems.map(k=>{
    const sn = k.text.length>18 ? k.text.slice(0,17)+'…' : k.text;
    const chk = k.done
      ? '<span class="gantt-chk gantt-chk-done">✓</span>'
      : '<span class="gantt-chk gantt-chk-pending"></span>';
    const labelTd = `<td class="gantt-label${k.done?' done-label':''}" title="${esc(k.text)}"><div class="gantt-label-inner">${chk}<span>${esc(sn)}</span></div></td>`;

    let cells;
    if(k.startDate && k.endDate){
      const barCls = k.done ? 'gantt-bar gantt-bar-done' : 'gantt-bar gantt-bar-active';
      cells = makeCells(k.startDate, k.endDate, barCls, null);
    } else if(k.endDate){
      // 終了日のみ → 案件開始〜KPI終了日
      const barCls = k.done ? 'gantt-bar gantt-bar-done' : 'gantt-bar gantt-bar-active';
      cells = makeCells(projStartStr, k.endDate, barCls, null);
    } else {
      // 日付未設定 → 空白セルのみ（バーなし）
      cells = days.map(d=>{
        const ds=dStr(d);
        const isToday=ds===todayStr;
        const isWE=d.getDay()===0||d.getDay()===6;
        const bg=isToday?'rgba(37,99,235,.05)':isWE?'#fafafa':'#fff';
        const todayLine=isToday?'border-left:2px solid var(--blue);':'';
        return`<td class="gantt-day-cell" style="background:${bg};padding:2px 0;${todayLine}"></td>`;
      }).join('');
    }
    return`<tr>${labelTd}${cells}</tr>`;
  }).join('');

  const noDateCount=kpiItems.filter(k=>!k.startDate&&!k.endDate).length;

  // 今日のインデックスを取得してスクロール位置を計算
  const todayIdx=days.findIndex(d=>dStr(d)===todayStr);
  // 1セル=28px として今日列へのスクロール位置（ラベル列120px分引く）
  const scrollToday=todayIdx>0?Math.max(0,(todayIdx-3)*28):0;

  return`<div class="gantt-wrap" data-scroll="${scrollToday}">
    <div class="gantt-title">
      ガントチャート
      <span style="font-size:10px;color:#94a3b8;font-weight:400;margin-left:6px">KPIの「編集」で開始日・納期日を設定するとバーが表示されます</span>
    </div>
    <div class="gantt-scroll-wrap" style="overflow-x:auto;-webkit-overflow-scrolling:touch;position:relative">
      <table class="gantt-table">
        <colgroup><col style="min-width:120px;width:120px"></colgroup>
        <thead>
          <tr><th class="gantt-label" style="font-size:10px;color:var(--text-muted);text-align:left;padding-left:4px;z-index:3">タスク</th>${monthCols}</tr>
          <tr><th class="gantt-label" style="z-index:3"></th>${dayCols}</tr>
        </thead>
        <tbody>
          ${projRow}
          ${kpiRows}
        </tbody>
      </table>
    </div>

function spRenderProjects(){

  if(['shot','internal','running','done'].includes(spFilter)){
    list=list.filter(p=>p.type===spFilter);
  } else if(spFilter==='this_month'){
    list=list.filter(p=>isThisMonth(p.endDate));
  } else if(spFilter==='next_month'){
    list=list.filter(p=>isNextMonth(p.endDate));
  } else if(spFilter==='unpaid'){
    list=list.filter(p=>!p.billing||p.billing==='unpaid');
  } else if(spFilter==='half_paid'){
    list=list.filter(p=>p.billing==='half_paid');
  } else if(spFilter==='full_paid'){
    list=list.filter(p=>p.billing==='full_paid');
  }
  if(!list.length){el.innerHTML='<div style="text-align:center;padding:40px;color:#94a3b8;font-size:13px">案件がありません</div>';return;}
  // 納品予定日順（未設定は末尾）
  list.sort((a,b)=>{
    if(!a.endDate&&!b.endDate)return 0;
    if(!a.endDate)return 1;
    if(!b.endDate)return -1;
    return a.endDate.localeCompare(b.endDate);
  });
  const TYPE_L={shot:'ショット',internal:'社内',running:'ランニング',done:'完了'};
  el.innerHTML=list.map(p=>{
    const days=workdaysLeft(p.endDate);
    const kpiPct=calcKpiPct(p.id);
    const pct=kpiPct!==null?kpiPct:(PROG_PCT[p.progStatus||'0']||0);
    const latestTask=getLatestKpiTask(p.id);
    // 残日数ラベル
    let spDaysCls='days-none',spDaysTxt='未設定';

    else if(days<0){spDaysTxt='期限切れ';spDaysCls='days-danger';}
    else if(days<=5){spDaysTxt=`残${days}日`;spDaysCls='days-danger';}
    else if(days<=10){spDaysTxt=`残${days}日`;spDaysCls='days-warn';}
    else{spDaysTxt=`残${days}日`;spDaysCls='days-ok';}

    return`<div class="sp-proj-card" onclick="openProjDetail('${p.id}')">
      <div class="sp-proj-name">${esc(p.name||'')}</div>
      <div class="sp-proj-client">${esc(p.client||'')}　<span class="type-badge type-${p.type||'shot'}" style="font-size:9px">${TYPE_L[p.type||'shot']}</span></div>

        <span class="sp-proj-label" style="white-space:nowrap">納品日</span>
        <span class="sp-proj-val">${p.endDate?fmtDFull(p.endDate):'未定'}</span>
        <span class="pk-card-days ${spDaysCls}" style="font-size:10px;padding:2px 8px;border-radius:999px;font-weight:600">${spDaysTxt}</span>
      </div>
      ${latestTask?`
        <div style="font-size:10px;font-weight:600;color:#94a3b8;margin-bottom:3px">現在の対応タスク</div>
        <div style="font-size:12px;color:var(--text-secondary);line-height:1.4;margin-bottom:6px">${esc(latestTask)}</div>
      `:''}
      <div style="font-size:18px;font-weight:700;color:${progColor(pct)};margin-bottom:5px">${pct}%</div>
      <div class="sp-prog-bar"><div class="sp-prog-fill" style="width:${pct}%;background:${progColor(pct)}"></div></div>
      `}
    </div>`;
  }).join('');
  spRenderAlerts();
}

let spAlertTab='critical';
function spRenderAlerts(){
  const area=document.getElementById('sp-alert-area');if(!area)return;
  const critical=[],warnings=[];
  projItems.forEach(p=>{
    if(p.type==='done'||p.progStatus==='complete'||p.progStatus==='maintenance')return;
    const kpiPct=calcKpiPct(p.id);
    const ep=kpiPct!==null?kpiPct:(PROG_PCT[p.progStatus||'0']||0);
    const days=workdaysLeft(p.endDate);
    const label=`${p.client?p.client+' / ':''}${p.name||'不明'}`;
    if(days===-1){critical.push(`「${label}」納品期限を過ぎています（進捗${ep}%）`);return;}
    if(days!==null&&days<=5&&ep<70)critical.push(`「${label}」残${days}日・進捗${ep}%`);
    else if(days!==null&&days<=10&&ep<50)warnings.push(`「${label}」残${days}日・進捗${ep}%`);
  });
  if(!critical.length&&!warnings.length){area.innerHTML='';return;}
  if(!critical.length&&spAlertTab==='critical')spAlertTab='warning';
  if(!warnings.length&&spAlertTab==='warning')spAlertTab='critical';

  const makeItem=(txt,color)=>`<div style="display:flex;align-items:flex-start;gap:6px;padding:4px 0">
    <span style="width:5px;height:5px;border-radius:50%;background:${color};flex-shrink:0;margin-top:4px;display:inline-block"></span>
    <span style="font-size:12px;font-weight:600;color:${color};line-height:1.45">${esc(txt)}</span>
  </div>`;

  const items=spAlertTab==='critical'
    ?critical.map(t=>makeItem(t,'var(--red)'))
    :warnings.map(t=>makeItem(t,'var(--brown)'));

  const critBtn=`<button onclick="spSwitchAlertTab('critical')" style="font-size:11px;padding:3px 11px;border-radius:999px;border:none;cursor:pointer;font-family:inherit;font-weight:600;transition:all .15s;${spAlertTab==='critical'?'background:var(--red);color:#fff':'background:var(--red-l);color:var(--red)'}">緊急 ${critical.length}件</button>`;
  const warnBtn=`<button onclick="spSwitchAlertTab('warning')" style="font-size:11px;padding:3px 11px;border-radius:999px;border:none;cursor:pointer;font-family:inherit;font-weight:600;transition:all .15s;${spAlertTab==='warning'?'background:var(--brown);color:#fff':'background:var(--brown-l);color:var(--brown);border:1px solid var(--brown-b)'}">注意 ${warnings.length}件</button>`;

  area.innerHTML=`<div style="background:var(--red-l);border:1px solid var(--red-b);border-radius:10px;padding:12px 14px;margin-bottom:12px">
    <div style="font-size:13px;font-weight:700;color:var(--red);margin-bottom:8px">要注意案件</div>
    <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap">
      ${critical.length?critBtn:''}
      ${warnings.length?warnBtn:''}
    </div>
    ${items.length?items.join(''):'<div style="font-size:12px;color:var(--text-muted)">該当案件なし</div>'}
  </div>`;
}
window.spSwitchAlertTab=(tab)=>{spAlertTab=tab;spRenderAlerts();};

const spCollapsed=new Set();
function spRenderProgress(){
  const el=document.getElementById('sp-prog-list');if(!el)return;
  if(!projItems.length){el.innerHTML='<div style="text-align:center;padding:40px;color:#94a3b8;font-size:13px">案件がありません</div>';return;}
  el.innerHTML=projItems.map(p=>{
    const kpi=kpiData[p.id]||{items:[]};
    const items=kpi.items||[];
    const done=items.filter(k=>k.done).length;
    const totalW=items.reduce((s,k)=>s+(k.weight||1),0);
    const doneW=items.filter(k=>k.done).reduce((s,k)=>s+(k.weight||1),0);
    const pct=totalW>0?Math.round(doneW/totalW*100):0;
    const days=workdaysLeft(p.endDate);
    const isOpen=!spCollapsed.has(p.id);
    const kpiHTML=items.map(k=>`
      <div class="sp-kpi-item${k.done?' done':''}" onclick="spToggleKpi('${p.id}','${k.id}')">
        <div class="sp-kpi-chk">${k.done?'✓':''}</div>
        <div class="sp-kpi-txt">${esc(k.text)}</div>
      </div>`).join('');
    return`<div class="sp-prog-card">
      <div class="sp-prog-hd" onclick="spToggleCollapse('${p.id}')">
        <div class="sp-prog-info">
          <div class="sp-prog-client">${esc(p.client||'')}</div>
          <div class="sp-prog-name">${esc(p.name)}</div>
          <div class="sp-prog-meta" style="margin-top:4px">
            ${p.endDate?`納品 ${fmtDFull(p.endDate)}`:''}
            ${days!==null?` | <span style="color:${days<0?'var(--red)':days<=5?'var(--red)':days<=10?'var(--yellow)':'var(--green)'};font-weight:${days<=10?700:600}">残${days<0?'期限切れ':days+'日'}</span>`:''}
          </div>
          <div style="margin-top:8px">
            <div class="sp-prog-bar"><div class="sp-prog-fill" style="width:${pct}%;background:${progColor(pct)}"></div></div>
            <div style="font-size:10px;color:#94a3b8;margin-top:3px">${done}/${items.length}タスク完了</div>
          </div>
        </div>
        <div class="sp-prog-right">
          <div class="sp-prog-pct" style="color:${progColor(pct)}">${pct}%</div>
          <div class="sp-prog-chevron${isOpen?' open':''}">▼</div>
        </div>
      </div>
      ${isOpen?`<div class="sp-prog-body open"><div style="border-top:1px solid #f1f5f9;padding-top:6px">${kpiHTML||'<div style="color:#94a3b8;font-size:12px;padding:10px 0">KPIが未設定です</div>'}</div></div>`:''}
    </div>`;
  }).join('');
}

window.spToggleCollapse=(id)=>{
  if(spCollapsed.has(id))spCollapsed.delete(id);
  else spCollapsed.add(id);
  spRenderProgress();
};
window.spToggleKpi=(projId,kpiId)=>{toggleKpi(projId,kpiId);};

// PC側データ更新時にスマホ画面も更新
function spRefresh(){
  if(window.innerWidth>720)return;
  spRenderProjects();
}


// ─── サイドバーリサイズ ───
(function(){
  const SIDEBAR_MIN = 140;
  const SIDEBAR_MAX = 360;
  const STORAGE_KEY = 'sidebar_width';

  const sidebar = document.getElementById('sidebar');
  const resizer = document.getElementById('sidebar-resizer');
  const main    = document.querySelector('.main');
  if(!sidebar || !resizer || !main) return;

  // 保存済み幅を復元
  const saved = parseInt(localStorage.getItem(STORAGE_KEY));
  if(saved && saved >= SIDEBAR_MIN && saved <= SIDEBAR_MAX){
    sidebar.style.width = saved + 'px';
    main.style.marginLeft = saved + 'px';
  }

  let startX, startW;

  resizer.addEventListener('mousedown', e=>{
    e.preventDefault();
    startX = e.clientX;
    startW = sidebar.getBoundingClientRect().width;
    resizer.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';

    function onMove(e){
      const dx = e.clientX - startX;
      const newW = Math.min(SIDEBAR_MAX, Math.max(SIDEBAR_MIN, startW + dx));
      sidebar.style.width = newW + 'px';
      main.style.marginLeft = newW + 'px';
    }
    function onUp(){
      resizer.classList.remove('dragging');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      // 幅を保存
      const w = parseInt(sidebar.style.width);
      if(w) localStorage.setItem(STORAGE_KEY, w);
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });

  // タッチ対応
  resizer.addEventListener('touchstart', e=>{
    const touch = e.touches[0];
    startX = touch.clientX;
    startW = sidebar.getBoundingClientRect().width;
    resizer.classList.add('dragging');

    function onMove(e){
      const t = e.touches[0];
      const dx = t.clientX - startX;
      const newW = Math.min(SIDEBAR_MAX, Math.max(SIDEBAR_MIN, startW + dx));
      sidebar.style.width = newW + 'px';
      main.style.marginLeft = newW + 'px';
    }
    function onEnd(){
      resizer.classList.remove('dragging');
      const w = parseInt(sidebar.style.width);
      if(w) localStorage.setItem(STORAGE_KEY, w);
      document.removeEventListener('touchmove', onMove);
      document.removeEventListener('touchend', onEnd);
    }
    document.addEventListener('touchmove', onMove, {passive:true});
    document.addEventListener('touchend', onEnd);
  });
})();
