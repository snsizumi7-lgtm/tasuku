<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>案件進捗トラッカー</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:#fff;color:#1a1a1a;min-height:100vh}
.header{border-bottom:1px solid #e8e8e8;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:10}
.header-left{display:flex;align-items:center;gap:10px}
.logo{font-size:16px;font-weight:600;letter-spacing:-.01em}
.sync-badge{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500}
.sync-ok{background:#f0faf0;color:#2d7a2d;border:1px solid #c3e6c3}
.sync-err{background:#fff0f0;color:#c0392b;border:1px solid #f5c6c6}
.sync-ing{background:#fffbf0;color:#8a6d00;border:1px solid #f0e0a0}
.save-flash{font-size:11px;color:#2d7a2d;opacity:0;transition:opacity .3s}
.save-flash.show{opacity:1}
.last-sync{font-size:11px;color:#bbb}
.main-tabs{display:flex;border-bottom:1px solid #e8e8e8;padding:0 24px;background:#fff}
.main-tab{padding:12px 16px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;color:#888;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s}
.main-tab:hover{color:#1a1a1a}
.main-tab.active{color:#1a1a1a;border-bottom-color:#1a1a1a}
.main-pane{display:none;padding:24px}.main-pane.active{display:block}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat{background:#fafafa;border:1px solid #e8e8e8;border-radius:8px;padding:14px;text-align:center}
.stat-num{font-size:24px;font-weight:600;line-height:1;margin-bottom:4px}
.stat-lbl{font-size:11px;color:#888;font-weight:500}
.sort-row{display:flex;align-items:center;gap:6px;margin-bottom:16px}
.sort-lbl{font-size:12px;color:#888}
.sort-btn{font-size:12px;padding:4px 10px;border:1px solid #e0e0e0;border-radius:4px;background:#fff;color:#555;cursor:pointer;font-family:inherit;transition:all .15s}
.sort-btn:hover{border-color:#aaa;color:#1a1a1a}
.sort-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.group-title{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#888;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #e8e8e8}
.card{background:#fff;border:1px solid #e8e8e8;border-radius:8px;padding:14px 16px;margin-bottom:8px;transition:box-shadow .15s}
.card:hover{box-shadow:0 2px 8px rgba(0,0,0,.06)}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.card-name{font-size:14px;font-weight:600;color:#1a1a1a;flex:1;line-height:1.4}
.badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:3px;white-space:nowrap;margin-left:8px;letter-spacing:.02em;cursor:pointer}
.b-danger{background:#fff0f0;color:#c0392b}
.b-warning{background:#fffbf0;color:#8a5200}
.b-info{background:#f0f6ff;color:#1a5ca8}
.b-success{background:#f0faf0;color:#2d7a2d}
.tasks{list-style:none;margin-bottom:8px}
.task-item{display:flex;align-items:flex-start;gap:8px;padding:4px 0;cursor:pointer;font-size:13px;color:#444;line-height:1.4;border-bottom:1px solid #f5f5f5}
.task-item:last-child{border-bottom:none}
.task-item:hover{color:#1a1a1a}
.task-item.done{color:#bbb}
.task-item.done .task-txt{text-decoration:line-through}
.task-date-badge{font-size:10px;white-space:nowrap;padding:1px 5px;border-radius:3px;background:#f5f5f5;color:#888}
.task-date-badge.overdue{background:#fff0f0;color:#c0392b;font-weight:600}
.task-date-badge.soon{background:#fffbf0;color:#e67e22;font-weight:600}
.chk{width:14px;height:14px;border:1.5px solid #ccc;border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;margin-top:1px;transition:all .15s}
.task-item.done .chk{background:#2d7a2d;border-color:#2d7a2d;color:#fff}
.task-main{flex:1;display:flex;justify-content:space-between;align-items:center;gap:8px}
.task-txt{flex:1}
.prog-bar{height:3px;background:#f0f0f0;border-radius:2px;overflow:hidden;margin-top:8px}
.prog-fill{height:100%;border-radius:2px;transition:width .4s}
.pf-danger{background:#e74c3c}.pf-warning{background:#f39c12}.pf-info{background:#3498db}.pf-success{background:#27ae60}
.card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.card-meta{font-size:11px;color:#aaa}
.card-acts{display:flex;gap:2px}
.act-btn{background:none;border:none;color:#ccc;cursor:pointer;font-size:13px;padding:2px 5px;border-radius:3px;transition:all .15s}
.act-btn:hover{background:#f5f5f5;color:#555}

/* カレンダー */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cal-title{font-size:16px;font-weight:600}
.cal-nav{background:none;border:1px solid #e0e0e0;border-radius:6px;padding:6px 14px;cursor:pointer;font-size:13px;color:#555;font-family:inherit;transition:all .15s}
.cal-nav:hover{background:#f5f5f5;border-color:#aaa}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:#e8e8e8;border:1px solid #e8e8e8;border-radius:8px;overflow:hidden}
.cal-dow{background:#fafafa;padding:8px 4px;text-align:center;font-size:11px;font-weight:600;color:#888;letter-spacing:.04em}
.cal-day{background:#fff;min-height:90px;padding:6px;cursor:default}
.cal-day.other{background:#fafafa;opacity:.5}
.cal-day.today{background:#fffef5}
.cal-day.has-tasks{cursor:pointer}
.cal-day.has-tasks:hover{background:#f8f8f8}
.cal-num{font-size:12px;font-weight:500;color:#888;margin-bottom:3px}
.cal-day.today .cal-num{color:#1a1a1a;font-weight:700}
.cal-chip{font-size:10px;padding:2px 5px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4}
.chip-danger{background:#fff0f0;color:#c0392b}
.chip-warning{background:#fffbf0;color:#8a5200}
.chip-info{background:#f0f6ff;color:#1a5ca8}
.chip-success{background:#f0faf0;color:#2d7a2d}
.chip-done{background:#f5f5f5;color:#bbb;text-decoration:line-through}
.cal-more{font-size:10px;color:#aaa;padding:1px 4px}

/* フォーム */
.form-section{background:#fafafa;border:1px solid #e8e8e8;border-radius:8px;padding:20px;margin-bottom:16px}
.form-label{font-size:12px;font-weight:600;color:#555;margin-bottom:6px;display:block;letter-spacing:.02em}
input[type=text],input[type=date],textarea,select{width:100%;padding:8px 10px;border:1px solid #e0e0e0;border-radius:6px;background:#fff;color:#1a1a1a;font-size:13px;font-family:inherit;margin-bottom:10px;transition:border-color .15s}
input[type=text]:focus,input[type=date]:focus,textarea:focus,select:focus{outline:none;border-color:#1a1a1a}
textarea{resize:vertical;min-height:70px}
.nippo-out{background:#fff;border:1px solid #e0e0e0;border-radius:6px;padding:14px;white-space:pre-wrap;font-size:13px;line-height:1.8;color:#333;min-height:60px}
.btn{padding:7px 16px;border:1px solid #e0e0e0;border-radius:6px;background:#fff;color:#333;font-size:13px;cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s}
.btn:hover{border-color:#aaa;background:#f5f5f5}
.btn-dark{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.btn-dark:hover{background:#333;border-color:#333}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:100;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:10px;padding:24px;width:90%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.12)}
.modal-title{font-size:15px;font-weight:600;margin-bottom:18px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.task-edit-row{display:grid;grid-template-columns:1fr 120px 24px;gap:6px;align-items:center;margin-bottom:8px}
.task-edit-row input{margin-bottom:0}
.rm-btn{background:none;border:none;color:#ccc;cursor:pointer;font-size:18px;line-height:1;padding:0;transition:color .15s;text-align:center}
.rm-btn:hover{color:#c0392b}
.section-box{background:#fafafa;border:1px solid #e8e8e8;border-radius:8px;padding:20px;margin-bottom:16px}
.section-box-title{font-size:13px;font-weight:600;margin-bottom:14px}
.info-box{background:#fff;border:1px solid #e8e8e8;border-radius:6px;padding:12px;font-size:12px;color:#666;line-height:1.8}
.loading{text-align:center;padding:40px;color:#aaa;font-size:13px}
.cal-detail-item{padding:8px 0;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:10px;font-size:13px}
.cal-detail-item:last-child{border-bottom:none}
@media(max-width:600px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .header,.main-pane{padding:12px 16px}
  .main-tabs{padding:0 16px}
  .cal-day{min-height:50px}
  .cal-chip{display:none}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="logo">案件進捗</span>
    <span class="sync-badge sync-ing" id="sync-status">接続中</span>
    <span class="save-flash" id="save-flash">保存しました</span>
  </div>
  <span class="last-sync" id="last-sync"></span>
</div>

<div class="main-tabs">
  <button class="main-tab active" onclick="switchTab('board',0)">進捗</button>
  <button class="main-tab" onclick="switchTab('calendar',1)">カレンダー</button>
  <button class="main-tab" onclick="switchTab('nippo',2)">日報</button>
  <button class="main-tab" onclick="switchTab('manage',3)">管理</button>
</div>

<!-- 進捗 -->
<div id="pane-board" class="main-pane active">
  <div class="stats">
    <div class="stat"><div class="stat-num" id="s-total" style="color:#1a1a1a">0</div><div class="stat-lbl">案件数</div></div>
    <div class="stat"><div class="stat-num" style="color:#c0392b" id="s-urgent">0</div><div class="stat-lbl">要対応</div></div>
    <div class="stat"><div class="stat-num" style="color:#8a5200" id="s-inprog">0</div><div class="stat-lbl">進行中</div></div>
    <div class="stat"><div class="stat-num" style="color:#2d7a2d" id="s-done">0</div><div class="stat-lbl">完了済</div></div>
  </div>
  <div class="sort-row">
    <span class="sort-lbl">並び順</span>
    <button class="sort-btn active" onclick="setSort('status',this)">ステータス</button>
    <button class="sort-btn" onclick="setSort('name',this)">案件名</button>
    <button class="sort-btn" onclick="setSort('deadline',this)">納期</button>
  </div>
  <div id="project-list"><div class="loading">読み込み中...</div></div>
</div>

<!-- カレンダー -->
<div id="pane-calendar" class="main-pane">
  <div class="cal-header">
    <button class="cal-nav" onclick="calMove(-1)">← 前月</button>
    <div class="cal-title" id="cal-title"></div>
    <button class="cal-nav" onclick="calMove(1)">次月 →</button>
  </div>
  <div class="cal-grid" id="cal-grid"></div>
  <div style="margin-top:12px;font-size:12px;color:#aaa">※ 日付をクリックするとその日のタスク詳細を表示します</div>
</div>

<!-- 日報 -->
<div id="pane-nippo" class="main-pane">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
    <span style="font-size:12px;color:#888;font-weight:500">対象日</span>
    <input type="date" id="nippo-date" style="width:auto;margin-bottom:0"/>
  </div>
  <div class="form-section">
    <label class="form-label">今日やったこと</label>
    <textarea id="today-input" placeholder="例：山田プレスLP 修正完了&#10;丸眞 キックオフ調整完了"></textarea>
    <label class="form-label">明日やること</label>
    <textarea id="tomorrow-input" placeholder="例：野田商店 Q&A確認&#10;GY ヨルーム投稿画像制作"></textarea>
    <label class="form-label">特記事項（任意）</label>
    <textarea id="memo-input" style="min-height:50px" placeholder="例：◯◯さん先方返信待ち"></textarea>
    <div class="btn-row">
      <button class="btn btn-dark" onclick="generateNippo()">日報を生成</button>
      <button class="btn" id="copy-btn" onclick="copyNippo()">コピー</button>
    </div>
  </div>
  <div id="nippo-out-wrap" style="display:none">
    <div class="form-label" style="margin-bottom:8px">生成された日報</div>
    <div class="nippo-out" id="nippo-output"></div>
  </div>
</div>

<!-- 管理 -->
<div id="pane-manage" class="main-pane">
  <div class="section-box">
    <div class="section-box-title">新規案件を追加</div>
    <label class="form-label">案件名</label>
    <input type="text" id="new-name" placeholder="例：〇〇 サイトリニューアル"/>
    <label class="form-label">案件の納期</label>
    <input type="text" id="new-deadline" placeholder="例：4月末、未定、随時"/>
    <label class="form-label">ステータス</label>
    <select id="new-status">
      <option value="urgent">要対応</option>
      <option value="inprog" selected>進行中</option>
      <option value="wait">待ち</option>
      <option value="done">完了</option>
    </select>
    <label class="form-label">タスク（1行1タスク）※納期日は追加後に編集で設定できます</label>
    <textarea id="new-tasks" placeholder="ヒアリング&#10;見積もり作成&#10;デザイン制作"></textarea>
    <div class="btn-row"><button class="btn btn-dark" onclick="addProject()">追加する</button></div>
  </div>
  <div class="section-box">
    <div class="section-box-title">データについて</div>
    <div class="info-box">データはFirebaseクラウドに自動保存されます。<br>どのデバイスからでも同じデータにアクセスできます。<br>接続先：tasuku-3e8ac (Firestore)</div>
  </div>
</div>

<!-- 編集モーダル -->
<div class="overlay" id="edit-modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title">案件を編集</div>
    <input type="hidden" id="edit-id"/>
    <label class="form-label">案件名</label>
    <input type="text" id="edit-name"/>
    <label class="form-label">案件の納期</label>
    <input type="text" id="edit-deadline"/>
    <label class="form-label">ステータス</label>
    <select id="edit-status">
      <option value="urgent">要対応</option>
      <option value="inprog">進行中</option>
      <option value="wait">待ち</option>
      <option value="done">完了</option>
    </select>
    <label class="form-label">タスク・納期日</label>
    <div style="display:grid;grid-template-columns:1fr 120px 24px;gap:6px;margin-bottom:4px">
      <span style="font-size:11px;color:#aaa;font-weight:500">タスク名</span>
      <span style="font-size:11px;color:#aaa;font-weight:500">納期日</span>
      <span></span>
    </div>
    <div id="edit-tasks-list"></div>
    <button class="btn" onclick="addEditTask()" style="margin-top:6px;font-size:12px">＋ タスクを追加</button>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-dark" onclick="saveEdit()">保存</button>
    </div>
  </div>
</div>

<!-- カレンダー詳細モーダル -->
<div class="overlay" id="cal-modal" onclick="if(event.target===this)document.getElementById('cal-modal').classList.remove('open')">
  <div class="modal">
    <div class="modal-title" id="cal-modal-title"></div>
    <div id="cal-modal-body"></div>
    <div class="modal-footer"><button class="btn" onclick="document.getElementById('cal-modal').classList.remove('open')">閉じる</button></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot, collection, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBpn6WRCh0UDmF5KkhcQihEJMQLniPQ3jc",
  authDomain: "tasuku-3e8ac.firebaseapp.com",
  projectId: "tasuku-3e8ac",
  storageBucket: "tasuku-3e8ac.firebasestorage.app",
  messagingSenderId: "551813900502",
  appId: "1:551813900502:web:753645be12622952108177",
  measurementId: "G-H6RSQR3TYB"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const colRef = collection(db, 'projects');

let projects = [];
let currentSort = 'status';
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();

function setSyncStatus(s) {
  const el = document.getElementById('sync-status');
  el.className = 'sync-badge';
  if(s==='ok') { el.classList.add('sync-ok'); el.textContent='同期済'; }
  if(s==='err'){ el.classList.add('sync-err'); el.textContent='エラー'; }
  if(s==='ing'){ el.classList.add('sync-ing'); el.textContent='同期中'; }
}
function flash() {
  const el = document.getElementById('save-flash');
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(()=>el.classList.remove('show'), 1800);
}

onSnapshot(colRef, snap => {
  const data = [];
  snap.forEach(d => data.push(d.data()));
  data.sort((a,b)=>(a.order||0)-(b.order||0));
  projects = data;
  renderProjects();
  renderCal();
  setSyncStatus('ok');
  document.getElementById('last-sync').textContent = new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})+' 更新';
}, ()=>setSyncStatus('err'));

async function saveP(p) {
  setSyncStatus('ing');
  try { await setDoc(doc(db,'projects',p.id), p); flash(); }
  catch(e) { setSyncStatus('err'); }
}
async function delP(pid) {
  setSyncStatus('ing');
  try { await deleteDoc(doc(db,'projects',pid)); }
  catch(e) { setSyncStatus('err'); }
}

const dOrd = d => {
  if(!d)return 18;
  if(d.includes('4/3')||d.includes('4月3'))return 1;
  if(d.includes('今週'))return 2;
  if(d.includes('4月頭'))return 3;
  if(d.includes('4/10')||d.includes('4月10'))return 4;
  if(d.includes('4月中旬'))return 5;
  if(d.includes('4/15')||d.includes('4月15'))return 6;
  if(d.includes('4月17')||d.includes('4/17'))return 7;
  if(d.includes('来週'))return 8;
  if(d.includes('4月末')||d.includes('近日'))return 9;
  if(d.includes('来月'))return 10;
  if(d.includes('6月'))return 13;
  if(d.includes('8月'))return 14;
  return 17;
};
const sOrd={urgent:0,inprog:1,wait:2,done:3};
const sLbl={urgent:'要対応',inprog:'進行中',wait:'待ち',done:'完了'};
const bCls={urgent:'b-danger',inprog:'b-warning',wait:'b-info',done:'b-success'};
const pCls={urgent:'pf-danger',inprog:'pf-warning',wait:'pf-info',done:'pf-success'};
const cCls={urgent:'chip-danger',inprog:'chip-warning',wait:'chip-info',done:'chip-success'};
const gNm={urgent:'要対応 / 今週中',inprog:'進行中',wait:'先方・社内待ち',done:'ほぼ完了'};

function getSorted(){
  const arr=[...projects];
  if(currentSort==='name')return arr.sort((a,b)=>a.name.localeCompare(b.name,'ja'));
  if(currentSort==='deadline')return arr.sort((a,b)=>dOrd(a.deadline)-dOrd(b.deadline));
  return arr.sort((a,b)=>sOrd[a.status]-sOrd[b.status]);
}
window.setSort=(t,el)=>{
  currentSort=t;
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderProjects();
};

function calcProg(p){return p.tasks.length?Math.round(p.tasks.filter(t=>t.done).length/p.tasks.length*100):0;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(d){
  if(!d)return '';
  try{const dt=new Date(d+'T00:00:00');return `${dt.getMonth()+1}/${dt.getDate()}`;}catch{return d;}
}
function isOver(d){if(!d)return false;try{return new Date(d+'T23:59:59')<new Date();}catch{return false;}}
function isSoon(d){if(!d)return false;try{const diff=(new Date(d+'T23:59:59')-new Date())/(864e5);return diff>=0&&diff<=3;}catch{return false;}}

function cardHTML(p){
  const done=p.tasks.filter(t=>t.done).length;
  const prog=calcProg(p);
  let h=`<div class="card">
    <div class="card-top">
      <span class="card-name">${esc(p.name)}</span>
      <span class="badge ${bCls[p.status]}" onclick="cycleStatus('${p.id}')" title="クリックでステータス変更">${sLbl[p.status]}</span>
    </div><ul class="tasks">`;
  p.tasks.forEach(t=>{
    const over=!t.done&&isOver(t.dueDate);
    const soon=!t.done&&!over&&isSoon(t.dueDate);
    const ds=fmtDate(t.dueDate);
    const dbCls=over?'overdue':soon?'soon':'';
    h+=`<li class="task-item${t.done?' done':''}" onclick="toggleTask('${p.id}','${t.id}')">
      <span class="chk">${t.done?'✓':''}</span>
      <span class="task-main">
        <span class="task-txt">${esc(t.text)}</span>
        ${ds?`<span class="task-date-badge ${dbCls}">${ds}</span>`:''}
      </span>
    </li>`;
  });
  h+=`</ul>
    <div class="prog-bar"><div class="prog-fill ${pCls[p.status]}" style="width:${prog}%"></div></div>
    <div class="card-footer">
      <span class="card-meta">納期：${esc(p.deadline)}　${done}/${p.tasks.length}完了</span>
      <div class="card-acts">
        <button class="act-btn" onclick="openEdit('${p.id}')">✏️</button>
        <button class="act-btn" onclick="deleteProject('${p.id}')">🗑</button>
      </div>
    </div>
  </div>`;
  return h;
}

function renderProjects(){
  const list=document.getElementById('project-list');
  const sorted=getSorted();
  const t={total:projects.length,urgent:0,inprog:0,done:0};
  projects.forEach(p=>{if(p.status==='urgent')t.urgent++;if(p.status==='inprog')t.inprog++;if(p.status==='done')t.done++;});
  let html='';
  if(currentSort==='status'){
    const g={urgent:[],inprog:[],wait:[],done:[]};
    sorted.forEach(p=>g[p.status].push(p));
    ['urgent','inprog','wait','done'].forEach(s=>{
      if(!g[s].length)return;
      html+=`<div style="margin-bottom:24px"><div class="group-title">${gNm[s]}</div>`;
      g[s].forEach(p=>{html+=cardHTML(p);});
      html+='</div>';
    });
  }else{sorted.forEach(p=>{html+=cardHTML(p);});}
  list.innerHTML=html;
  document.getElementById('s-total').textContent=t.total;
  document.getElementById('s-urgent').textContent=t.urgent;
  document.getElementById('s-inprog').textContent=t.inprog;
  document.getElementById('s-done').textContent=t.done;
}

// カレンダー
function renderCal(){
  const title=document.getElementById('cal-title');
  const grid=document.getElementById('cal-grid');
  title.textContent=`${calYear}年${calMonth+1}月`;
  const dows=['日','月','火','水','木','金','土'];
  let html=dows.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const lastDate=new Date(calYear,calMonth+1,0).getDate();
  const prevLast=new Date(calYear,calMonth,0).getDate();
  const now=new Date();
  const todayStr=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  const byDate={};
  projects.forEach(p=>p.tasks.forEach(t=>{if(t.dueDate){if(!byDate[t.dueDate])byDate[t.dueDate]=[];byDate[t.dueDate].push({...t,pName:p.name,pStatus:p.status,pid:p.id});}}));
  for(let i=firstDay-1;i>=0;i--)html+=`<div class="cal-day other"><div class="cal-num">${prevLast-i}</div></div>`;
  let cells=firstDay;
  for(let d=1;d<=lastDate;d++){
    const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=ds===todayStr;
    const tasks=byDate[ds]||[];
    let chips='';
    tasks.slice(0,3).forEach(t=>{
      const cl=t.done?'chip-done':cCls[t.pStatus]||'chip-info';
      const nm=t.pName.length>6?t.pName.slice(0,6)+'…':t.pName;
      chips+=`<div class="cal-chip ${cl}">${esc(nm)}</div>`;
    });
    if(tasks.length>3)chips+=`<div class="cal-more">+${tasks.length-3}</div>`;
    const hasTasks=tasks.length>0;
    html+=`<div class="cal-day${isToday?' today':''}${hasTasks?' has-tasks':''}" ${hasTasks?`onclick="openCalDetail('${ds}')"`:''}><div class="cal-num">${d}</div>${chips}</div>`;
    cells++;
  }
  const rem=7-(cells%7);
  if(rem<7)for(let d=1;d<=rem;d++)html+=`<div class="cal-day other"><div class="cal-num">${d}</div></div>`;
  grid.innerHTML=html;
}
window.calMove=(dir)=>{
  calMonth+=dir;
  if(calMonth>11){calMonth=0;calYear++;}
  if(calMonth<0){calMonth=11;calYear--;}
  renderCal();
};
window.openCalDetail=(ds)=>{
  const tasks=[];
  projects.forEach(p=>p.tasks.forEach(t=>{if(t.dueDate===ds)tasks.push({...t,pName:p.name,pStatus:p.status});}));
  const dt=new Date(ds+'T00:00:00');
  document.getElementById('cal-modal-title').textContent=`${dt.getMonth()+1}月${dt.getDate()}日のタスク`;
  let html='';
  if(!tasks.length)html='<p style="color:#aaa;font-size:13px;padding:8px 0">この日のタスクはありません</p>';
  else tasks.forEach(t=>{
    const cl=t.done?'chip-done':cCls[t.pStatus]||'chip-info';
    html+=`<div class="cal-detail-item"><span class="cal-chip ${cl}" style="flex-shrink:0">${esc(t.pName)}</span><span style="${t.done?'text-decoration:line-through;color:#aaa':''}">${esc(t.text)}</span></div>`;
  });
  document.getElementById('cal-modal-body').innerHTML=html;
  document.getElementById('cal-modal').classList.add('open');
};

window.toggleTask=(pid,tid)=>{
  const p=projects.find(x=>x.id===pid);
  const t=p&&p.tasks.find(x=>x.id===tid);
  if(!t)return;
  t.done=!t.done;p.progress=calcProg(p);saveP(p);
};
window.cycleStatus=(pid)=>{
  const order=['urgent','inprog','wait','done'];
  const p=projects.find(x=>x.id===pid);
  if(!p)return;
  p.status=order[(order.indexOf(p.status)+1)%order.length];saveP(p);
};
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

window.addProject=()=>{
  const name=document.getElementById('new-name').value.trim();
  if(!name){alert('案件名を入力してください');return;}
  const deadline=document.getElementById('new-deadline').value.trim()||'未定';
  const status=document.getElementById('new-status').value;
  const raw=document.getElementById('new-tasks').value.trim();
  const tasks=raw?raw.split('\n').filter(l=>l.trim()).map(l=>({id:uid(),text:l.trim(),done:false,dueDate:''})):[{id:uid(),text:'対応中',done:false,dueDate:''}];
  saveP({id:uid(),name,deadline,status,tasks,progress:0,order:Date.now()});
  document.getElementById('new-name').value='';
  document.getElementById('new-deadline').value='';
  document.getElementById('new-tasks').value='';
  switchTab('board',0);
  alert(`「${name}」を追加しました`);
};
window.deleteProject=(pid)=>{
  const p=projects.find(x=>x.id===pid);
  if(!p||!confirm(`「${p.name}」を削除しますか？`))return;
  delP(pid);
};
window.openEdit=(pid)=>{
  const p=projects.find(x=>x.id===pid);
  if(!p)return;
  document.getElementById('edit-id').value=pid;
  document.getElementById('edit-name').value=p.name;
  document.getElementById('edit-deadline').value=p.deadline;
  document.getElementById('edit-status').value=p.status;
  document.getElementById('edit-tasks-list').innerHTML=p.tasks.map(t=>`
    <div class="task-edit-row">
      <input type="text" value="${esc(t.text)}" data-id="${t.id}" data-done="${t.done}" placeholder="タスク名" style="margin-bottom:0"/>
      <input type="date" value="${t.dueDate||''}" style="margin-bottom:0"/>
      <button class="rm-btn" onclick="this.parentElement.remove()">×</button>
    </div>`).join('');
  document.getElementById('edit-modal').classList.add('open');
};
window.addEditTask=()=>{
  const div=document.createElement('div');
  div.className='task-edit-row';
  div.innerHTML=`<input type="text" placeholder="タスク名" data-id="${uid()}" data-done="false" style="margin-bottom:0"/><input type="date" style="margin-bottom:0"/><button class="rm-btn" onclick="this.parentElement.remove()">×</button>`;
  document.getElementById('edit-tasks-list').appendChild(div);
};
window.saveEdit=()=>{
  const pid=document.getElementById('edit-id').value;
  const p=projects.find(x=>x.id===pid);
  if(!p)return;
  p.name=document.getElementById('edit-name').value.trim()||p.name;
  p.deadline=document.getElementById('edit-deadline').value.trim()||p.deadline;
  p.status=document.getElementById('edit-status').value;
  p.tasks=Array.from(document.querySelectorAll('#edit-tasks-list .task-edit-row')).map(row=>{
    const ti=row.querySelector('input[type=text]');
    const di=row.querySelector('input[type=date]');
    if(!ti||!ti.value.trim())return null;
    return{id:ti.dataset.id||uid(),text:ti.value.trim(),done:ti.dataset.done==='true',dueDate:di?di.value:''};
  }).filter(Boolean);
  p.progress=calcProg(p);
  saveP(p);closeModal();
};
window.closeModal=()=>document.getElementById('edit-modal').classList.remove('open');

window.generateNippo=()=>{
  const d=document.getElementById('nippo-date').value;
  const today=document.getElementById('today-input').value.trim();
  const tmr=document.getElementById('tomorrow-input').value.trim();
  const memo=document.getElementById('memo-input').value.trim();
  const dateStr=d?new Date(d).toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'short'}):'（日付未設定）';
  const fmt=t=>t?t.split('\n').map(l=>`　・${l}`).join('\n'):'　（未入力）';
  let text=`【日報】${dateStr}\n\n■ 本日の作業内容\n${fmt(today)}\n\n■ 明日の予定\n${fmt(tmr)}\n`;
  if(memo)text+=`\n■ 特記事項・連絡\n　${memo.split('\n').join('\n　')}\n`;
  document.getElementById('nippo-output').textContent=text;
  document.getElementById('nippo-out-wrap').style.display='block';
};
window.copyNippo=()=>{
  const text=document.getElementById('nippo-output').textContent;
  if(!text)return;
  navigator.clipboard.writeText(text).then(()=>{
    const btn=document.getElementById('copy-btn');
    btn.textContent='コピーしました';
    setTimeout(()=>btn.textContent='コピー',1500);
  });
};
window.switchTab=(t,idx)=>{
  document.querySelectorAll('.main-tab').forEach((el,i)=>el.classList.toggle('active',i===idx));
  ['board','calendar','nippo','manage'].forEach(id=>document.getElementById('pane-'+id).classList.toggle('active',id===t));
  if(t==='calendar')renderCal();
};

document.getElementById('nippo-date').value=new Date().toISOString().split('T')[0];
</script>
