<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>案件進捗トラッカー</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#2563eb;--blue-light:#eff6ff;--blue-border:#bfdbfe;
  --red:#dc2626;--red-light:#fef2f2;--red-border:#fecaca;
  --yellow:#d97706;--yellow-light:#fffbeb;--yellow-border:#fde68a;
  --green:#059669;--green-light:#ecfdf5;--green-border:#a7f3d0;
  --purple:#7c3aed;--purple-light:#f5f3ff;--purple-border:#ddd6fe;
  --gray:#374151;--gray-light:#f9fafb;--gray-border:#e5e7eb;
  --orange:#ea580c;--orange-light:#fff7ed;--orange-border:#fed7aa;
  --teal:#0d9488;--teal-light:#f0fdfa;--teal-border:#99f6e4;
  --pink:#db2777;--pink-light:#fdf2f8;--pink-border:#fbcfe8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:#f8fafc;color:#1a1a1a;min-height:100vh;display:flex}

/* サイドバー */
.sidebar{width:196px;min-height:100vh;background:#fff;border-right:1px solid #e5e7eb;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:20}
.sidebar-logo{padding:18px 16px 14px;border-bottom:1px solid #f1f5f9}
.logo-title{font-size:15px;font-weight:600;color:#1e293b}
.logo-sub{font-size:11px;color:#94a3b8;margin-top:2px}
.sidebar-nav{flex:1;padding:10px 8px;overflow-y:auto}
.nav-section{font-size:10px;font-weight:600;color:#94a3b8;letter-spacing:.07em;padding:0 8px;margin:12px 0 4px}
.nav-btn{display:flex;align-items:center;gap:8px;width:100%;padding:8px 10px;border:1.5px solid transparent;background:none;color:#64748b;font-size:13px;font-weight:500;cursor:pointer;border-radius:7px;font-family:inherit;text-align:left;transition:all .15s;margin-bottom:2px}
.nav-btn:hover{background:#f8fafc;color:#1e293b}
.nav-btn.active{font-weight:600}
.nav-btn.nb-task.active{background:var(--blue-light);color:var(--blue);border-color:var(--blue-border)}
.nav-btn.nb-board.active{background:var(--purple-light);color:var(--purple);border-color:var(--purple-border)}
.nav-btn.nb-cal.active{background:var(--teal-light);color:var(--teal);border-color:var(--teal-border)}
.nav-btn.nb-nippo.active{background:var(--green-light);color:var(--green);border-color:var(--green-border)}
.nav-btn.nb-manage.active{background:var(--orange-light);color:var(--orange);border-color:var(--orange-border)}
.nav-indicator{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0;opacity:.5}
.nav-btn.active .nav-indicator{opacity:1}
.sidebar-footer{padding:10px 8px;border-top:1px solid #f1f5f9}
.sync-pill{font-size:11px;padding:4px 10px;border-radius:999px;font-weight:500;display:block;text-align:center;border:1.5px solid transparent}
.sync-ok{background:var(--green-light);color:var(--green);border-color:var(--green-border)}
.sync-err{background:var(--red-light);color:var(--red);border-color:var(--red-border)}
.sync-ing{background:var(--yellow-light);color:var(--yellow);border-color:var(--yellow-border)}
.save-flash{font-size:11px;color:var(--green);text-align:center;display:block;margin-top:4px;opacity:0;transition:opacity .3s;height:14px}
.save-flash.show{opacity:1}
.last-sync-txt{font-size:10px;color:#cbd5e1;text-align:center;display:block;margin-top:3px}

/* メイン */
.main{margin-left:196px;flex:1}
.main-pane{display:none;padding:24px;max-width:1100px}.main-pane.active{display:block}
.pane-title{font-size:20px;font-weight:600;margin-bottom:20px;color:#0f172a}

/* 統計 */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.stat{background:#fff;border-radius:9px;padding:14px 16px;border:1.5px solid #e5e7eb;position:relative;overflow:hidden}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.stat-total::before{background:var(--blue)}
.stat-inprog::before{background:var(--purple)}
.stat-done::before{background:var(--green)}
.stat-alert::before{background:var(--red)}
.stat-num{font-size:26px;font-weight:600;color:#0f172a;line-height:1}
.stat-lbl{font-size:11px;color:#94a3b8;margin-top:4px;font-weight:500}

/* ソート */
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.sort-row{display:flex;align-items:center;gap:6px}
.sort-lbl{font-size:12px;color:#94a3b8;font-weight:500}
.sort-btn{font-size:12px;padding:5px 11px;border:1.5px solid #e5e7eb;border-radius:6px;background:#fff;color:#64748b;cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s}
.sort-btn:hover{border-color:var(--blue);color:var(--blue)}
.sort-btn.active{background:var(--blue-light);color:var(--blue);border-color:var(--blue-border)}
.filter-row{display:flex;align-items:center;gap:6px}
.filter-select{font-size:12px;padding:5px 10px;border:1.5px solid #e5e7eb;border-radius:6px;background:#fff;color:#64748b;cursor:pointer;font-family:inherit;font-weight:500}

/* ステータスラベル定義 */
.s-estimate{--sc:var(--gray);--sb:var(--gray-border);--sl:var(--gray-light)}
.s-start{--sc:var(--blue);--sb:var(--blue-border);--sl:var(--blue-light)}
.s-wip{--sc:var(--purple);--sb:var(--purple-border);--sl:var(--purple-light)}
.s-review{--sc:var(--yellow);--sb:var(--yellow-border);--sl:var(--yellow-light)}
.s-fix{--sc:var(--orange);--sb:var(--orange-border);--sl:var(--orange-light)}
.s-deliver{--sc:var(--teal);--sb:var(--teal-border);--sl:var(--teal-light)}
.s-invoice{--sc:var(--pink);--sb:var(--pink-border);--sl:var(--pink-light)}
.s-done{--sc:var(--green);--sb:var(--green-border);--sl:var(--green-light)}
.s-alert{--sc:var(--red);--sb:var(--red-border);--sl:var(--red-light)}

/* タスクカード */
.group-wrap{margin-bottom:24px}
.group-hd{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.group-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:999px;background:var(--sl);color:var(--sc);border:1.5px solid var(--sb)}
.group-count{font-size:11px;color:#94a3b8}
.task-card{background:#fff;border-radius:9px;padding:14px 16px;margin-bottom:7px;border:1.5px solid #e5e7eb;transition:box-shadow .15s;border-left:3px solid var(--sc)}
.task-card:hover{box-shadow:0 2px 10px rgba(0,0,0,.07)}
.tc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;gap:8px}
.tc-name{font-size:14px;font-weight:600;color:#0f172a;flex:1;line-height:1.4}
.tc-badges{display:flex;gap:5px;flex-wrap:wrap;flex-shrink:0}
.tc-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:5px;border:1.5px solid var(--sb);background:var(--sl);color:var(--sc);cursor:pointer;white-space:nowrap;transition:opacity .15s}
.tc-badge:hover{opacity:.75}
.tc-project{font-size:11px;color:#94a3b8;margin-bottom:6px}
.tc-assignee{font-size:11px;color:#64748b;display:inline-flex;align-items:center;gap:4px;background:#f1f5f9;padding:2px 8px;border-radius:999px;margin-bottom:8px}
.tc-subtasks{list-style:none}
.tc-subtask{display:flex;align-items:flex-start;gap:7px;padding:3px 0;cursor:pointer;font-size:13px;color:#475569;border-bottom:1px solid #f8fafc}
.tc-subtask:last-child{border-bottom:none}
.tc-subtask:hover{color:#0f172a}
.tc-subtask.done{color:#cbd5e1}
.tc-subtask.done .tc-st-txt{text-decoration:line-through}
.tc-chk{width:14px;height:14px;border:1.5px solid #d1d5db;border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;margin-top:1px;transition:all .15s}
.tc-subtask.done .tc-chk{background:var(--green);border-color:var(--green);color:#fff}
.tc-st-main{flex:1;display:flex;justify-content:space-between;align-items:center;gap:6px}
.tc-st-txt{flex:1;line-height:1.4}
.date-tag{font-size:10px;padding:1px 6px;border-radius:3px;font-weight:500;white-space:nowrap}
.date-normal{background:#f1f5f9;color:#64748b}
.date-over{background:var(--red-light);color:var(--red)}
.date-soon{background:var(--yellow-light);color:var(--yellow)}
.tc-prog{height:3px;background:#f1f5f9;border-radius:2px;overflow:hidden;margin-top:8px}
.tc-prog-fill{height:100%;border-radius:2px;background:var(--sc);transition:width .4s}
.tc-footer{display:flex;justify-content:space-between;align-items:center;margin-top:7px}
.tc-meta{font-size:11px;color:#94a3b8}
.tc-acts{display:flex;gap:4px}
.act-btn{font-size:12px;padding:3px 9px;border:1.5px solid #e5e7eb;border-radius:5px;background:#fff;color:#94a3b8;cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s}
.act-btn:hover{color:#374151;border-color:#d1d5db;background:#f8fafc}
.act-edit:hover{color:var(--blue);border-color:var(--blue-border);background:var(--blue-light)}
.act-del:hover{color:var(--red);border-color:var(--red-border);background:var(--red-light)}

/* カンバンボード */
.kanban{display:flex;gap:12px;overflow-x:auto;padding-bottom:16px;align-items:flex-start}
.kanban::-webkit-scrollbar{height:6px}
.kanban::-webkit-scrollbar-track{background:#f1f5f9;border-radius:3px}
.kanban::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
.kb-col{width:220px;flex-shrink:0;background:#f8fafc;border-radius:10px;border:1.5px solid #e5e7eb;overflow:hidden}
.kb-col-hd{padding:10px 12px;font-size:12px;font-weight:600;border-bottom:1.5px solid #e5e7eb;display:flex;align-items:center;justify-content:space-between;background:var(--sl)}
.kb-col-title{color:var(--sc)}
.kb-col-cnt{font-size:11px;font-weight:500;background:var(--sb);color:var(--sc);padding:1px 7px;border-radius:999px}
.kb-cards{padding:8px;min-height:80px}
.kb-card{background:#fff;border-radius:7px;padding:10px 12px;margin-bottom:6px;border:1.5px solid #e5e7eb;cursor:default;transition:box-shadow .15s;border-left:3px solid var(--sc)}
.kb-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.07)}
.kb-card-name{font-size:12px;font-weight:600;color:#0f172a;margin-bottom:3px;line-height:1.4}
.kb-card-proj{font-size:11px;color:#94a3b8;margin-bottom:4px}
.kb-card-assignee{font-size:10px;color:#64748b;background:#f1f5f9;padding:1px 6px;border-radius:999px;display:inline-block}
.kb-card-deadline{font-size:10px;margin-top:4px}

/* カレンダー */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-title{font-size:16px;font-weight:600;color:#0f172a}
.cal-nav{border:1.5px solid #e5e7eb;border-radius:7px;padding:6px 14px;cursor:pointer;font-size:13px;font-weight:500;color:#374151;background:#fff;font-family:inherit;transition:all .15s}
.cal-nav:hover{border-color:var(--teal);color:var(--teal);background:var(--teal-light)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:#e5e7eb;border:1px solid #e5e7eb;border-radius:10px;overflow:hidden}
.cal-dow{background:#f8fafc;padding:7px 4px;text-align:center;font-size:11px;font-weight:600;color:#94a3b8;letter-spacing:.04em}
.cal-day{background:#fff;min-height:90px;padding:5px}
.cal-day.other{background:#fafafa;opacity:.55}
.cal-day.today{background:#eff6ff}
.cal-day.has-tasks{cursor:pointer}
.cal-day.has-tasks:hover{background:#f5f3ff}
.cal-num{font-size:12px;font-weight:500;color:#94a3b8;margin-bottom:3px}
.cal-day.today .cal-num{color:var(--blue);font-weight:700}
.cal-chip{font-size:10px;padding:2px 5px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4;font-weight:500;background:var(--sl);color:var(--sc)}
.chip-done{background:#f1f5f9;color:#94a3b8;text-decoration:line-through}
.cal-more{font-size:10px;color:#94a3b8;padding:1px 3px}
.cal-detail-item{padding:8px 0;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;gap:8px;font-size:13px}
.cal-detail-item:last-child{border-bottom:none}

/* フォーム */
.form-card{background:#fff;border-radius:10px;padding:22px;margin-bottom:14px;border:1.5px solid #e5e7eb}
.form-card-title{font-size:14px;font-weight:600;margin-bottom:16px;color:#0f172a}
.form-label{font-size:12px;font-weight:600;color:#374151;margin-bottom:5px;display:block}
input[type=text],input[type=date],textarea,select{width:100%;padding:8px 11px;border:1.5px solid #e5e7eb;border-radius:7px;background:#fff;color:#0f172a;font-size:13px;font-family:inherit;margin-bottom:10px;transition:border-color .15s}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--blue)}
textarea{resize:vertical;min-height:70px}
.nippo-out{background:#f8fafc;border:1.5px solid #e5e7eb;border-radius:7px;padding:14px;white-space:pre-wrap;font-size:13px;line-height:1.8;color:#374151;min-height:60px}
.btn{padding:7px 16px;border:1.5px solid #e5e7eb;border-radius:7px;background:#fff;color:#374151;font-size:13px;cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s}
.btn:hover{border-color:#d1d5db;background:#f8fafc}
.btn-blue{border-color:var(--blue-border);color:var(--blue);background:var(--blue-light)}
.btn-blue:hover{background:var(--blue);color:#fff}
.btn-green{border-color:var(--green-border);color:var(--green);background:var(--green-light)}
.btn-green:hover{background:var(--green);color:#fff}
.btn-orange{border-color:var(--orange-border);color:var(--orange);background:var(--orange-light)}
.btn-orange:hover{background:var(--orange);color:#fff}
.btn-red{border-color:var(--red-border);color:var(--red);background:var(--red-light)}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}

/* モーダル */
.overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.3);z-index:100;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;padding:24px;width:90%;max-width:520px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-title{font-size:16px;font-weight:600;margin-bottom:20px;color:#0f172a}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.subtask-row{display:grid;grid-template-columns:1fr 120px 24px;gap:6px;align-items:center;margin-bottom:7px}
.subtask-row input{margin-bottom:0}
.rm-btn{background:none;border:none;color:#d1d5db;cursor:pointer;font-size:17px;padding:0;transition:color .15s}
.rm-btn:hover{color:var(--red)}
.info-box{background:#f8fafc;border:1.5px solid #e5e7eb;border-radius:7px;padding:12px;font-size:12px;color:#64748b;line-height:1.8}
.loading{text-align:center;padding:48px;color:#94a3b8;font-size:13px}

/* 案件タグ一覧 */
.project-tag{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:4px 10px;border-radius:999px;border:1.5px solid #e5e7eb;background:#fff;color:#374151;margin:3px;cursor:default}
.project-tag .del-tag{background:none;border:none;color:#d1d5db;cursor:pointer;font-size:14px;line-height:1;padding:0;margin-left:2px;transition:color .15s}
.project-tag .del-tag:hover{color:var(--red)}
.projects-wrap{margin-bottom:12px;min-height:32px}

/* モバイル */
.mobile-header{display:none;background:#fff;border-bottom:1px solid #e5e7eb;padding:12px 16px;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:15}
.mobile-menu-btn{border:1.5px solid #e5e7eb;border-radius:6px;background:#fff;color:#374151;font-size:13px;font-weight:500;cursor:pointer;padding:5px 12px;font-family:inherit}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:19}

@media(max-width:720px){
  .sidebar{transform:translateX(-100%);transition:transform .25s}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.open{display:block}
  .main{margin-left:0}
  .mobile-header{display:flex}
  .main-pane{padding:14px}
  .stats{grid-template-columns:repeat(2,1fr)}
  .cal-day{min-height:50px}
  .cal-chip{display:none}
  .kanban{gap:8px}
  .kb-col{width:180px}
}
</style>
</head>
<body>

<div class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-title">案件進捗</div>
    <div class="logo-sub">プロジェクト管理</div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section">メイン</div>
    <button class="nav-btn nb-task active" onclick="switchTab('task',this)">
      <span class="nav-indicator"></span>タスク管理
    </button>
    <button class="nav-btn nb-board" onclick="switchTab('board',this)">
      <span class="nav-indicator"></span>ステータスボード
    </button>
    <button class="nav-btn nb-cal" onclick="switchTab('calendar',this)">
      <span class="nav-indicator"></span>カレンダー
    </button>
    <div class="nav-section">その他</div>
    <button class="nav-btn nb-nippo" onclick="switchTab('nippo',this)">
      <span class="nav-indicator"></span>日報作成
    </button>
    <button class="nav-btn nb-manage" onclick="switchTab('manage',this)">
      <span class="nav-indicator"></span>管理設定
    </button>
  </nav>
  <div class="sidebar-footer">
    <span class="sync-pill sync-ing" id="sync-status">接続中</span>
    <span class="save-flash" id="save-flash">保存しました</span>
    <span class="last-sync-txt" id="last-sync"></span>
  </div>
</div>

<div class="mobile-header">
  <button class="mobile-menu-btn" onclick="toggleMobileMenu()">メニュー</button>
  <span style="font-size:14px;font-weight:600;color:#0f172a">案件進捗</span>
  <span class="sync-pill sync-ing" id="sync-status-m" style="font-size:10px;padding:2px 8px">接続中</span>
</div>
<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeMobileMenu()"></div>

<div class="main">

<!-- タスク管理 -->
<div id="pane-task" class="main-pane active">
  <div class="pane-title">タスク管理</div>
  <div class="stats">
    <div class="stat stat-total"><div class="stat-num" id="s-total" style="color:var(--blue)">0</div><div class="stat-lbl">タスク総数</div></div>
    <div class="stat stat-inprog"><div class="stat-num" id="s-inprog" style="color:var(--purple)">0</div><div class="stat-lbl">進行中</div></div>
    <div class="stat stat-done"><div class="stat-num" id="s-done" style="color:var(--green)">0</div><div class="stat-lbl">完了</div></div>
    <div class="stat stat-alert"><div class="stat-num" id="s-over" style="color:var(--red)">0</div><div class="stat-lbl">期限切れ</div></div>
  </div>
  <div class="toolbar">
    <div class="sort-row">
      <span class="sort-lbl">並び順</span>
      <button class="sort-btn active" onclick="setSort('status',this)">ステータス</button>
      <button class="sort-btn" onclick="setSort('name',this)">案件名</button>
      <button class="sort-btn" onclick="setSort('deadline',this)">締切</button>
    </div>
    <div class="filter-row">
      <span class="sort-lbl">担当者</span>
      <select class="filter-select" id="filter-assignee" onchange="renderTasks()">
        <option value="">全員</option>
      </select>
    </div>
  </div>
  <div id="task-list"><div class="loading">読み込み中...</div></div>
</div>

<!-- ステータスボード -->
<div id="pane-board" class="main-pane">
  <div class="pane-title">ステータスボード</div>
  <div class="kanban" id="kanban-board"></div>
</div>

<!-- カレンダー -->
<div id="pane-calendar" class="main-pane">
  <div class="pane-title">カレンダー</div>
  <div class="cal-header">
    <button class="cal-nav" onclick="calMove(-1)">前月</button>
    <div class="cal-title" id="cal-title"></div>
    <button class="cal-nav" onclick="calMove(1)">次月</button>
  </div>
  <div class="cal-grid" id="cal-grid"></div>
  <div style="margin-top:10px;font-size:12px;color:#94a3b8">締切日のあるタスクが表示されます。日付をクリックすると詳細を確認できます。</div>
</div>

<!-- 日報 -->
<div id="pane-nippo" class="main-pane">
  <div class="pane-title">日報作成</div>
  <div class="form-card">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <span class="form-label" style="margin-bottom:0">対象日</span>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBpn6WRCh0UDmF5KkhcQihEJMQLniPQ3jc",
  authDomain: "tasuku-3e8ac.firebaseapp.com",
  projectId: "tasuku-3e8ac",
  storageBucket: "tasuku-3e8ac.firebasestorage.app",
  messagingSenderId: "551813900502",
  appId: "1:551813900502:web:753645be12622952108177",
  measurementId: "G-H6RSQR3TYB"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// コレクション
const tasksCol = collection(db, 'tasks_v2');
const metaDoc  = doc(db, 'meta', 'config');

// ─── ステータス定義 ───
const STATUSES = [
  {id:'estimate', label:'見積もり作成', cls:'s-estimate'},
  {id:'start',    label:'着手',         cls:'s-start'},
  {id:'wip',      label:'対応中',       cls:'s-wip'},
  {id:'review',   label:'確認中',       cls:'s-review'},
  {id:'fix',      label:'修正対応中',   cls:'s-fix'},
  {id:'deliver',  label:'納品',         cls:'s-deliver'},
  {id:'invoice',  label:'請求書',       cls:'s-invoice'},
  {id:'done',     label:'完了',         cls:'s-done'},
  {id:'alert',    label:'要対応',       cls:'s-alert'},
];
const STATUS_MAP = Object.fromEntries(STATUSES.map(s=>[s.id,s]));

// ─── 状態 ───
let tasks = [];
let projects = [];   // 案件マスター（文字列配列）
let assignees = [];  // 担当者マスター（文字列配列）
let currentSort = 'status';
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();

// ─── Sync ───
function setSyncStatus(s) {
  ['sync-status','sync-status-m'].forEach(id=>{
    const el=document.getElementById(id);if(!el)return;
    el.className='sync-pill';
    if(s==='ok'){el.classList.add('sync-ok');el.textContent='同期済';}
    if(s==='err'){el.classList.add('sync-err');el.textContent='エラー';}
    if(s==='ing'){el.classList.add('sync-ing');el.textContent='同期中';}
  });
}
function flash(){const el=document.getElementById('save-flash');el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),1800);}

// メタデータ読み込み
async function loadMeta(){
  try{
    const snap=await getDoc(metaDoc);
    if(snap.exists()){
      const d=snap.data();
      projects=d.projects||[];
      assignees=d.assignees||[];
    }
  }catch(e){}
  renderMeta();
}
async function saveMeta(){
  try{await setDoc(metaDoc,{projects,assignees});}catch(e){}
}

// タスク監視
onSnapshot(tasksCol,snap=>{
  const data=[];
  snap.forEach(d=>data.push(d.data()));
  data.sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));
  tasks=data;
  renderTasks();
  renderBoard();
  renderCal();
  updateStats();
  setSyncStatus('ok');
  document.getElementById('last-sync').textContent=new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})+' 更新';
},()=>setSyncStatus('err'));

async function saveTask(t){setSyncStatus('ing');try{await setDoc(doc(db,'tasks_v2',t.id),t);flash();}catch{setSyncStatus('err');}}
async function delTask(id){setSyncStatus('ing');try{await deleteDoc(doc(db,'tasks_v2',id));}catch{setSyncStatus('err');}}

// ─── ユーティリティ ───
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(d){if(!d)return '';try{const dt=new Date(d+'T00:00:00');return `${dt.getMonth()+1}/${dt.getDate()}`;}catch{return d;}}
function isOver(d){if(!d)return false;try{return new Date(d+'T23:59:59')<new Date();}catch{return false;}}
function isSoon(d){if(!d)return false;try{const diff=(new Date(d+'T23:59:59')-new Date())/864e5;return diff>=0&&diff<=3;}catch{return false;}}
function calcProg(t){const subs=t.subtasks||[];return subs.length?Math.round(subs.filter(s=>s.done).length/subs.length*100):0;}
function statusCls(id){return STATUS_MAP[id]?.cls||'s-wip';}
function statusLabel(id){return STATUS_MAP[id]?.label||id;}

// ─── ソート ───
const SORT_STATUS_ORDER = Object.fromEntries(STATUSES.map((s,i)=>[s.id,i]));
function getSortedTasks(){
  const filterA = document.getElementById('filter-assignee')?.value||'';
  let arr = filterA ? tasks.filter(t=>t.assignee===filterA) : [...tasks];
  if(currentSort==='name') return arr.sort((a,b)=>(a.project||'').localeCompare(b.project||'','ja'));
  if(currentSort==='deadline') return arr.sort((a,b)=>{
    if(!a.deadline&&!b.deadline)return 0;
    if(!a.deadline)return 1;if(!b.deadline)return -1;
    return a.deadline.localeCompare(b.deadline);
  });
  return arr.sort((a,b)=>(SORT_STATUS_ORDER[a.status]||0)-(SORT_STATUS_ORDER[b.status]||0));
}
window.setSort=(t,el)=>{currentSort=t;document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');renderTasks();};

// ─── 統計 ───
function updateStats(){
  const filterA = document.getElementById('filter-assignee')?.value||'';
  const filtered = filterA ? tasks.filter(t=>t.assignee===filterA) : tasks;
  const inprog = filtered.filter(t=>!['done','deliver','invoice'].includes(t.status)).length;
  const done   = filtered.filter(t=>t.status==='done').length;
  const over   = filtered.filter(t=>t.deadline&&isOver(t.deadline)&&t.status!=='done').length;
  document.getElementById('s-total').textContent=filtered.length;
  document.getElementById('s-inprog').textContent=inprog;
  document.getElementById('s-done').textContent=done;
  document.getElementById('s-over').textContent=over;
}

// ─── タスク一覧 ───
function taskCardHTML(t){
  const st=statusCls(t.status);
  const prog=calcProg(t);
  const subs=t.subtasks||[];
  const dl=fmtDate(t.deadline);
  const dlCls=isOver(t.deadline)?'date-over':isSoon(t.deadline)?'date-soon':'date-normal';
  let subsHTML='';
  subs.forEach(s=>{
    const sdl=fmtDate(s.dueDate);
    const sdlCls=isOver(s.dueDate)?'date-over':isSoon(s.dueDate)?'date-soon':'date-normal';
    subsHTML+=`<li class="tc-subtask${s.done?' done':''}" onclick="toggleSub('${t.id}','${s.id}')">
      <span class="tc-chk">${s.done?'✓':''}</span>
      <span class="tc-st-main">
        <span class="tc-st-txt">${esc(s.text)}</span>
        ${sdl?`<span class="date-tag ${sdlCls}">${sdl}</span>`:''}
      </span>
    </li>`;
  });
  return `<div class="task-card ${st}">
    <div class="tc-top">
      <div>
        ${t.project?`<div class="tc-project">${esc(t.project)}</div>`:''}
        <div class="tc-name">${esc(t.name)}</div>
        ${t.assignee?`<span class="tc-assignee">${esc(t.assignee)}</span>`:''}
      </div>
      <div class="tc-badges">
        ${dl?`<span class="date-tag ${dlCls}">${dl}</span>`:''}
        <span class="tc-badge ${st}" onclick="cycleStatus('${t.id}')" title="クリックでステータス変更">${statusLabel(t.status)}</span>
      </div>
    </div>
    ${subs.length?`<ul class="tc-subtasks">${subsHTML}</ul>`:''}
    ${subs.length?`<div class="tc-prog"><div class="tc-prog-fill" style="width:${prog}%"></div></div>`:''}
    <div class="tc-footer">
      <span class="tc-meta">${subs.length?`${subs.filter(s=>s.done).length}/${subs.length}完了`:'サブタスクなし'}</span>
      <div class="tc-acts">
        <button class="act-btn act-edit" onclick="openEdit('${t.id}')">編集</button>
        <button class="act-btn act-del" onclick="deleteTask('${t.id}')">削除</button>
      </div>
    </div>
  </div>`;
}

function renderTasks(){
  const list=document.getElementById('task-list');
  if(!list)return;
  const sorted=getSortedTasks();
  updateStats();
  if(!sorted.length){list.innerHTML='<div class="loading">タスクがありません</div>';return;}
  let html='';
  if(currentSort==='status'){
    STATUSES.forEach(s=>{
      const grp=sorted.filter(t=>t.status===s.id);
      if(!grp.length)return;
      html+=`<div class="group-wrap">
        <div class="group-hd">
          <span class="group-badge ${s.cls}">${s.label}</span>
          <span class="group-count">${grp.length}件</span>
        </div>`;
      grp.forEach(t=>{html+=taskCardHTML(t);});
      html+='</div>';
    });
  }else{
    sorted.forEach(t=>{html+=taskCardHTML(t);});
  }
  list.innerHTML=html;
  // 担当者フィルター更新
  const sel=document.getElementById('filter-assignee');
  const cur=sel.value;
  sel.innerHTML='<option value="">全員</option>';
  assignees.forEach(a=>{sel.innerHTML+=`<option value="${esc(a)}"${a===cur?' selected':''}>${esc(a)}</option>`;});
}

// ─── ステータスボード（カンバン）───
function renderBoard(){
  const board=document.getElementById('kanban-board');
  if(!board)return;
  let html='';
  STATUSES.forEach(s=>{
    const grp=tasks.filter(t=>t.status===s.id);
    html+=`<div class="kb-col ${s.cls}">
      <div class="kb-col-hd">
        <span class="kb-col-title">${s.label}</span>
        <span class="kb-col-cnt">${grp.length}</span>
      </div>
      <div class="kb-cards">`;
    grp.forEach(t=>{
      const dl=fmtDate(t.deadline);
      const dlCls=isOver(t.deadline)?'date-over':isSoon(t.deadline)?'date-soon':'date-normal';
      html+=`<div class="kb-card ${s.cls}">
        ${t.project?`<div class="kb-card-proj">${esc(t.project)}</div>`:''}
        <div class="kb-card-name">${esc(t.name)}</div>
        ${t.assignee?`<div class="kb-card-assignee">${esc(t.assignee)}</div>`:''}
        ${dl?`<div class="kb-card-deadline"><span class="date-tag ${dlCls}">${dl}</span></div>`:''}
      </div>`;
    });
    html+='</div></div>';
  });
  board.innerHTML=html;
}

// ─── カレンダー ───
function renderCal(){
  const title=document.getElementById('cal-title');
  const grid=document.getElementById('cal-grid');
  if(!title||!grid)return;
  title.textContent=`${calYear}年${calMonth+1}月`;
  const dows=['日','月','火','水','木','金','土'];
  let html=dows.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const lastDate=new Date(calYear,calMonth+1,0).getDate();
  const prevLast=new Date(calYear,calMonth,0).getDate();
  const now=new Date();
  const todayStr=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  // 締切があるもの収集（タスク本体 + サブタスク）
  const byDate={};
  tasks.forEach(t=>{
    if(t.deadline){
      if(!byDate[t.deadline])byDate[t.deadline]=[];
      byDate[t.deadline].push({name:t.name,project:t.project,status:t.status,done:t.status==='done'});
    }
    (t.subtasks||[]).forEach(s=>{
      if(s.dueDate){
        if(!byDate[s.dueDate])byDate[s.dueDate]=[];
        byDate[s.dueDate].push({name:s.text,project:t.name,status:t.status,done:s.done});
      }
    });
  });
  for(let i=firstDay-1;i>=0;i--)html+=`<div class="cal-day other"><div class="cal-num">${prevLast-i}</div></div>`;
  let cells=firstDay;
  for(let d=1;d<=lastDate;d++){
    const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=ds===todayStr;
    const items=byDate[ds]||[];
    let chips='';
    items.slice(0,3).forEach(item=>{
      const cl=item.done?'chip-done':statusCls(item.status);
      const nm=item.name.length>7?item.name.slice(0,7)+'…':item.name;
      chips+=`<div class="cal-chip ${cl}">${esc(nm)}</div>`;
    });
    if(items.length>3)chips+=`<div class="cal-more">+${items.length-3}件</div>`;
    html+=`<div class="cal-day${isToday?' today':''}${items.length?' has-tasks':''}" ${items.length?`onclick="openCalDetail('${ds}')"`:''}><div class="cal-num">${d}</div>${chips}</div>`;
    cells++;
  }
  const rem=7-(cells%7);
  if(rem<7)for(let d=1;d<=rem;d++)html+=`<div class="cal-day other"><div class="cal-num">${d}</div></div>`;
  grid.innerHTML=html;
}
window.calMove=(dir)=>{calMonth+=dir;if(calMonth>11){calMonth=0;calYear++;}if(calMonth<0){calMonth=11;calYear--;}renderCal();};
window.openCalDetail=(ds)=>{
  const items=[];
  tasks.forEach(t=>{
    if(t.deadline===ds)items.push({name:t.name,project:t.project,status:t.status,done:t.status==='done'});
    (t.subtasks||[]).forEach(s=>{if(s.dueDate===ds)items.push({name:s.text,project:t.name,status:t.status,done:s.done});});
  });
  const dt=new Date(ds+'T00:00:00');
  document.getElementById('cal-modal-title').textContent=`${dt.getMonth()+1}月${dt.getDate()}日の締切`;
  let html='';
  if(!items.length)html='<p style="color:#94a3b8;font-size:13px;padding:8px 0">この日の締切はありません</p>';
  else items.forEach(item=>{
    const cl=item.done?'chip-done':statusCls(item.status);
    html+=`<div class="cal-detail-item"><span class="cal-chip ${cl}" style="flex-shrink:0;white-space:nowrap">${esc(item.project||'')}</span><span style="${item.done?'text-decoration:line-through;color:#94a3b8':''}">${esc(item.name)}</span></div>`;
  });
  document.getElementById('cal-modal-body').innerHTML=html;
  document.getElementById('cal-modal').classList.add('open');
};

// ─── タスク操作 ───
window.cycleStatus=(id)=>{
  const t=tasks.find(x=>x.id===id);if(!t)return;
  const idx=STATUSES.findIndex(s=>s.id===t.status);
  t.status=STATUSES[(idx+1)%STATUSES.length].id;
  saveTask(t);
};
window.toggleSub=(tid,sid)=>{
  const t=tasks.find(x=>x.id===tid);if(!t)return;
  const s=t.subtasks.find(x=>x.id===sid);if(!s)return;
  s.done=!s.done;saveTask(t);
};
window.deleteTask=(id)=>{
  const t=tasks.find(x=>x.id===id);
  if(!t||!confirm(`「${t.name}」を削除しますか？`))return;
  delTask(id);
};
window.addTask=()=>{
  const proj=document.getElementById('new-task-project').value;
  const name=document.getElementById('new-task-name').value.trim();
  if(!name){alert('タスク名を入力してください');return;}
  const assignee=document.getElementById('new-task-assignee').value;
  const status=document.getElementById('new-task-status').value;
  const deadline=document.getElementById('new-task-deadline').value;
  const rawSubs=document.getElementById('new-task-subs').value.trim();
  const subtasks=rawSubs?rawSubs.split('\n').filter(l=>l.trim()).map(l=>({id:uid(),text:l.trim(),done:false,dueDate:''})):[];
  const newTask={id:uid(),project:proj,name,assignee,status,deadline,subtasks,createdAt:Date.now()};
  saveTask(newTask);
  document.getElementById('new-task-name').value='';
  document.getElementById('new-task-deadline').value='';
  document.getElementById('new-task-subs').value='';
  switchTab('task',document.querySelector('.nb-task'));
  alert(`「${name}」を追加しました`);
};

// ─── 編集モーダル ───
window.openEdit=(id)=>{
  const t=tasks.find(x=>x.id===id);if(!t)return;
  document.getElementById('edit-id').value=id;
  // 案件セレクト
  const epSel=document.getElementById('edit-project');
  epSel.innerHTML='<option value="">-- 案件を選択 --</option>';
  projects.forEach(p=>epSel.innerHTML+=`<option value="${esc(p)}"${p===t.project?' selected':''}>${esc(p)}</option>`);
  document.getElementById('edit-name').value=t.name;
  // 担当者セレクト
  const eaSel=document.getElementById('edit-assignee');
  eaSel.innerHTML='<option value="">-- 担当者を選択 --</option>';
  assignees.forEach(a=>eaSel.innerHTML+=`<option value="${esc(a)}"${a===t.assignee?' selected':''}>${esc(a)}</option>`);
  document.getElementById('edit-status').value=t.status;
  document.getElementById('edit-deadline').value=t.deadline||'';
  // サブタスク
  document.getElementById('edit-subs-list').innerHTML=(t.subtasks||[]).map(s=>`
    <div class="subtask-row">
      <input type="text" value="${esc(s.text)}" data-id="${s.id}" data-done="${s.done}" placeholder="サブタスク名" style="margin-bottom:0"/>
      <input type="date" value="${s.dueDate||''}" style="margin-bottom:0"/>
      <button class="rm-btn" onclick="this.parentElement.remove()">x</button>
    </div>`).join('');
  document.getElementById('edit-modal').classList.add('open');
};
window.addEditSub=()=>{
  const div=document.createElement('div');div.className='subtask-row';
  div.innerHTML=`<input type="text" placeholder="サブタスク名" data-id="${uid()}" data-done="false" style="margin-bottom:0"/><input type="date" style="margin-bottom:0"/><button class="rm-btn" onclick="this.parentElement.remove()">x</button>`;
  document.getElementById('edit-subs-list').appendChild(div);
};
window.saveEdit=()=>{
  const id=document.getElementById('edit-id').value;
  const t=tasks.find(x=>x.id===id);if(!t)return;
  t.project=document.getElementById('edit-project').value;
  t.name=document.getElementById('edit-name').value.trim()||t.name;
  t.assignee=document.getElementById('edit-assignee').value;
  t.status=document.getElementById('edit-status').value;
  t.deadline=document.getElementById('edit-deadline').value;
  t.subtasks=Array.from(document.querySelectorAll('#edit-subs-list .subtask-row')).map(row=>{
    const ti=row.querySelector('input[type=text]');
    const di=row.querySelector('input[type=date]');
    if(!ti||!ti.value.trim())return null;
    return{id:ti.dataset.id||uid(),text:ti.value.trim(),done:ti.dataset.done==='true',dueDate:di?di.value:''};
  }).filter(Boolean);
  saveTask(t);closeModal('edit-modal');
};

// ─── 案件・担当者マスター ───
function renderMeta(){
  // 案件タグ
  const ptWrap=document.getElementById('project-tags');
  if(ptWrap){
    ptWrap.innerHTML=projects.map(p=>`<span class="project-tag">${esc(p)}<button class="del-tag" onclick="delProject('${esc(p)}')">x</button></span>`).join('');
  }
  // 担当者タグ
  const atWrap=document.getElementById('assignee-tags');
  if(atWrap){
    atWrap.innerHTML=assignees.map(a=>`<span class="project-tag">${esc(a)}<button class="del-tag" onclick="delAssignee('${esc(a)}')">x</button></span>`).join('');
  }
  // セレクトボックス更新
  ['new-task-project','edit-project'].forEach(id=>{
    const sel=document.getElementById(id);if(!sel)return;
    const cur=sel.value;
    sel.innerHTML='<option value="">-- 案件を選択 --</option>';
    projects.forEach(p=>sel.innerHTML+=`<option value="${esc(p)}"${p===cur?' selected':''}>${esc(p)}</option>`);
  });
  ['new-task-assignee','edit-assignee','filter-assignee'].forEach(id=>{
    const sel=document.getElementById(id);if(!sel)return;
    const cur=sel.value;
    const hasAll=id==='filter-assignee';
    sel.innerHTML=hasAll?'<option value="">全員</option>':'<option value="">-- 担当者を選択 --</option>';
    assignees.forEach(a=>sel.innerHTML+=`<option value="${esc(a)}"${a===cur?' selected':''}>${esc(a)}</option>`);
  });
}
window.addProjectMaster=()=>{
  const val=document.getElementById('new-project-name').value.trim();
  if(!val||projects.includes(val))return;
  projects.push(val);saveMeta();renderMeta();
  document.getElementById('new-project-name').value='';
};
window.delProject=(name)=>{
  projects=projects.filter(p=>p!==name);saveMeta();renderMeta();
};
window.addAssigneeMaster=()=>{
  const val=document.getElementById('new-assignee-name').value.trim();
  if(!val||assignees.includes(val))return;
  assignees.push(val);saveMeta();renderMeta();
  document.getElementById('new-assignee-name').value='';
};
window.delAssignee=(name)=>{
  assignees=assignees.filter(a=>a!==name);saveMeta();renderMeta();
};

// ─── 日報 ───
window.generateNippo=()=>{
  const d=document.getElementById('nippo-date').value;
  const today=document.getElementById('today-input').value.trim();
  const tmr=document.getElementById('tomorrow-input').value.trim();
  const memo=document.getElementById('memo-input').value.trim();
  const dateStr=d?new Date(d).toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'short'}):'（日付未設定）';
  const fmt=t=>t?t.split('\n').map(l=>`　・${l}`).join('\n'):'　（未入力）';
  let text=`【日報】${dateStr}\n\n■ 本日の作業内容\n${fmt(today)}\n\n■ 明日の予定\n${fmt(tmr)}\n`;
  if(memo)text+=`\n■ 特記事項・連絡\n　${memo.split('\n').join('\n　')}\n`;
  document.getElementById('nippo-output').textContent=text;
  document.getElementById('nippo-out-wrap').style.display='block';
};
window.copyNippo=()=>{
  const text=document.getElementById('nippo-output').textContent;if(!text)return;
  navigator.clipboard.writeText(text).then(()=>{const btn=document.getElementById('copy-btn');btn.textContent='コピーしました';setTimeout(()=>btn.textContent='コピー',1500);});
};

// ─── タブ・モーダル ───
window.closeModal=(id)=>document.getElementById(id).classList.remove('open');
window.switchTab=(t,el)=>{
  ['task','board','calendar','nippo','manage'].forEach(id=>document.getElementById('pane-'+id).classList.toggle('active',id===t));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  if(el&&el.classList)el.classList.add('active');
  if(t==='calendar')renderCal();
  if(t==='board')renderBoard();
  closeMobileMenu();
};
window.toggleMobileMenu=()=>{document.getElementById('sidebar').classList.toggle('open');document.getElementById('sidebar-overlay').classList.toggle('open');};
window.closeMobileMenu=()=>{document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebar-overlay').classList.remove('open');};

// ─── 初期化 ───
document.getElementById('nippo-date').value=new Date().toISOString().split('T')[0];
loadMeta();
</script>
