<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>案件進捗トラッカー</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:#f4f6fb;color:#1a1a1a;min-height:100vh;display:flex}

/* サイドバー */
.sidebar{width:200px;min-height:100vh;background:#2c3e6b;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:20}
.sidebar-logo{padding:20px 16px 16px;border-bottom:1px solid rgba(255,255,255,.1)}
.logo-title{font-size:15px;font-weight:600;color:#fff;letter-spacing:-.01em}
.logo-sub{font-size:11px;color:rgba(255,255,255,.5);margin-top:3px}
.sidebar-nav{flex:1;padding:12px 8px}
.nav-label{font-size:10px;font-weight:600;color:rgba(255,255,255,.35);letter-spacing:.08em;padding:0 8px;margin:10px 0 6px}
.nav-btn{display:flex;align-items:center;gap:9px;width:100%;padding:9px 12px;border:none;background:none;color:rgba(255,255,255,.65);font-size:13px;font-weight:500;cursor:pointer;border-radius:6px;font-family:inherit;text-align:left;transition:all .15s;margin-bottom:2px}
.nav-btn:hover{background:rgba(255,255,255,.1);color:#fff}
.nav-btn.active{color:#fff}
.nav-btn.active.nav-board{background:#3b82f6}
.nav-btn.active.nav-cal{background:#8b5cf6}
.nav-btn.active.nav-nippo{background:#10b981}
.nav-btn.active.nav-manage{background:#f59e0b}
.nav-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.3);flex-shrink:0}
.nav-btn.active .nav-dot{background:#fff}
.sidebar-bottom{padding:12px 8px;border-top:1px solid rgba(255,255,255,.1)}
.sync-pill{font-size:11px;padding:4px 10px;border-radius:999px;font-weight:500;display:block;text-align:center}
.sync-ok{background:rgba(16,185,129,.2);color:#6ee7b7}
.sync-err{background:rgba(239,68,68,.2);color:#fca5a5}
.sync-ing{background:rgba(245,158,11,.2);color:#fcd34d}
.save-flash{font-size:11px;color:rgba(16,185,129,.9);text-align:center;display:block;margin-top:5px;opacity:0;transition:opacity .3s;height:14px}
.save-flash.show{opacity:1}
.last-sync-txt{font-size:10px;color:rgba(255,255,255,.3);text-align:center;display:block;margin-top:5px}

/* メインコンテンツ */
.main{margin-left:200px;flex:1;min-height:100vh}
.main-pane{display:none;padding:28px;max-width:960px}.main-pane.active{display:block}
.pane-title{font-size:20px;font-weight:600;margin-bottom:20px;color:#1a1a1a}

/* 統計カード */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat{background:#fff;border-radius:10px;padding:16px;text-align:center;border-top:3px solid transparent}
.stat-total{border-top-color:#2c3e6b}
.stat-urgent{border-top-color:#ef4444}
.stat-inprog{border-top-color:#f59e0b}
.stat-done{border-top-color:#10b981}
.stat-num{font-size:26px;font-weight:600;line-height:1;margin-bottom:4px}
.stat-lbl{font-size:11px;color:#888;font-weight:500}

/* ソート */
.sort-row{display:flex;align-items:center;gap:6px;margin-bottom:16px}
.sort-lbl{font-size:12px;color:#888}
.sort-btn{font-size:12px;padding:5px 12px;border:1.5px solid #e0e0e0;border-radius:6px;background:#fff;color:#666;cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s}
.sort-btn:hover{border-color:#3b82f6;color:#3b82f6}
.sort-btn.active{background:#3b82f6;color:#fff;border-color:#3b82f6}

/* グループ */
.group-wrap{margin-bottom:28px}
.group-title{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;margin-bottom:10px;padding:4px 10px;border-radius:4px;display:inline-block}
.gt-urgent{background:#fee2e2;color:#b91c1c}
.gt-inprog{background:#fef3c7;color:#92400e}
.gt-wait{background:#dbeafe;color:#1e40af}
.gt-done{background:#d1fae5;color:#065f46}

/* カード */
.card{background:#fff;border-radius:10px;padding:14px 16px;margin-bottom:8px;transition:box-shadow .15s;border-left:3px solid transparent}
.card:hover{box-shadow:0 4px 12px rgba(0,0,0,.08)}
.card-urgent{border-left-color:#ef4444}
.card-inprog{border-left-color:#f59e0b}
.card-wait{border-left-color:#3b82f6}
.card-done{border-left-color:#10b981}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.card-name{font-size:14px;font-weight:600;color:#1a1a1a;flex:1;line-height:1.4}
.badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:4px;white-space:nowrap;margin-left:8px;cursor:pointer;transition:opacity .15s}
.badge:hover{opacity:.8}
.b-danger{background:#fee2e2;color:#b91c1c}
.b-warning{background:#fef3c7;color:#92400e}
.b-info{background:#dbeafe;color:#1e40af}
.b-success{background:#d1fae5;color:#065f46}
.tasks{list-style:none;margin-bottom:8px}
.task-item{display:flex;align-items:flex-start;gap:8px;padding:4px 0;cursor:pointer;font-size:13px;color:#444;line-height:1.4;border-bottom:1px solid #f5f5f5}
.task-item:last-child{border-bottom:none}
.task-item:hover{color:#1a1a1a}
.task-item.done{color:#bbb}
.task-item.done .task-txt{text-decoration:line-through}
.task-date-badge{font-size:10px;white-space:nowrap;padding:1px 6px;border-radius:3px;font-weight:500}
.task-date-badge.normal{background:#f1f5f9;color:#64748b}
.task-date-badge.overdue{background:#fee2e2;color:#b91c1c}
.task-date-badge.soon{background:#fef3c7;color:#92400e}
.chk{width:15px;height:15px;border:1.5px solid #d1d5db;border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;margin-top:1px;transition:all .15s}
.task-item.done .chk{background:#10b981;border-color:#10b981;color:#fff}
.task-main{flex:1;display:flex;justify-content:space-between;align-items:center;gap:8px}
.task-txt{flex:1}
.prog-wrap{margin-top:8px}
.prog-bar{height:4px;background:#f1f5f9;border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .4s}
.pf-danger{background:#ef4444}.pf-warning{background:#f59e0b}.pf-info{background:#3b82f6}.pf-success{background:#10b981}
.card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.card-meta{font-size:11px;color:#aaa}
.card-acts{display:flex;gap:3px}
.act-btn{border:1px solid #e5e7eb;border-radius:5px;color:#9ca3af;cursor:pointer;font-size:12px;padding:3px 7px;background:#fff;transition:all .15s;font-family:inherit}
.act-btn:hover{background:#f1f5f9;color:#374151;border-color:#d1d5db}
.act-edit:hover{color:#3b82f6;border-color:#bfdbfe;background:#eff6ff}
.act-del:hover{color:#ef4444;border-color:#fecaca;background:#fef2f2}

/* カレンダー */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cal-title{font-size:16px;font-weight:600}
.cal-nav{background:#fff;border:1.5px solid #e5e7eb;border-radius:7px;padding:7px 16px;cursor:pointer;font-size:13px;color:#374151;font-family:inherit;font-weight:500;transition:all .15s}
.cal-nav:hover{background:#f1f5f9;border-color:#8b5cf6;color:#8b5cf6}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:#e5e7eb;border:1px solid #e5e7eb;border-radius:10px;overflow:hidden}
.cal-dow{background:#f8fafc;padding:8px 4px;text-align:center;font-size:11px;font-weight:600;color:#64748b;letter-spacing:.04em}
.cal-day{background:#fff;min-height:90px;padding:6px}
.cal-day.other{background:#f9fafb;opacity:.6}
.cal-day.today{background:#eff6ff}
.cal-day.has-tasks{cursor:pointer}
.cal-day.has-tasks:hover{background:#f5f3ff}
.cal-num{font-size:12px;font-weight:500;color:#64748b;margin-bottom:3px}
.cal-day.today .cal-num{color:#2563eb;font-weight:700}
.cal-chip{font-size:10px;padding:2px 5px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4;font-weight:500}
.chip-danger{background:#fee2e2;color:#b91c1c}
.chip-warning{background:#fef3c7;color:#92400e}
.chip-info{background:#dbeafe;color:#1e40af}
.chip-success{background:#d1fae5;color:#065f46}
.chip-done{background:#f1f5f9;color:#94a3b8;text-decoration:line-through}
.cal-more{font-size:10px;color:#94a3b8;padding:1px 4px}

/* フォーム */
.form-card{background:#fff;border-radius:10px;padding:22px;margin-bottom:16px}
.form-card-title{font-size:14px;font-weight:600;margin-bottom:16px;color:#1a1a1a}
.form-label{font-size:12px;font-weight:600;color:#374151;margin-bottom:6px;display:block}
input[type=text],input[type=date],textarea,select{width:100%;padding:9px 11px;border:1.5px solid #e5e7eb;border-radius:7px;background:#fff;color:#1a1a1a;font-size:13px;font-family:inherit;margin-bottom:10px;transition:border-color .15s}
input[type=text]:focus,input[type=date]:focus,textarea:focus,select:focus{outline:none;border-color:#3b82f6}
textarea{resize:vertical;min-height:70px}
.nippo-out{background:#f8fafc;border:1.5px solid #e5e7eb;border-radius:7px;padding:14px;white-space:pre-wrap;font-size:13px;line-height:1.8;color:#374151;min-height:60px}
.btn{padding:8px 18px;border:1.5px solid #e5e7eb;border-radius:7px;background:#fff;color:#374151;font-size:13px;cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s}
.btn:hover{border-color:#d1d5db;background:#f1f5f9}
.btn-blue{background:#3b82f6;color:#fff;border-color:#3b82f6}
.btn-blue:hover{background:#2563eb;border-color:#2563eb}
.btn-green{background:#10b981;color:#fff;border-color:#10b981}
.btn-green:hover{background:#059669;border-color:#059669}
.btn-amber{background:#f59e0b;color:#fff;border-color:#f59e0b}
.btn-amber:hover{background:#d97706;border-color:#d97706}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}

/* モーダル */
.overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.35);z-index:100;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;padding:26px;width:90%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-title{font-size:16px;font-weight:600;margin-bottom:20px;color:#1a1a1a}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.task-edit-row{display:grid;grid-template-columns:1fr 120px 28px;gap:6px;align-items:center;margin-bottom:8px}
.task-edit-row input{margin-bottom:0}
.rm-btn{background:none;border:none;color:#d1d5db;cursor:pointer;font-size:18px;line-height:1;padding:0;transition:color .15s;text-align:center}
.rm-btn:hover{color:#ef4444}
.info-box{background:#f8fafc;border:1.5px solid #e5e7eb;border-radius:7px;padding:14px;font-size:12px;color:#64748b;line-height:1.8}
.loading{text-align:center;padding:48px;color:#94a3b8;font-size:13px}
.cal-detail-item{padding:9px 0;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;gap:10px;font-size:13px}
.cal-detail-item:last-child{border-bottom:none}

/* モバイル */
.mobile-header{display:none;background:#2c3e6b;padding:13px 16px;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:15}
.mobile-menu-btn{background:rgba(255,255,255,.15);border:none;color:#fff;font-size:14px;font-weight:600;cursor:pointer;padding:6px 12px;border-radius:6px;font-family:inherit}
.mobile-title{font-size:14px;font-weight:600;color:#fff}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:19}

@media(max-width:700px){
  .sidebar{transform:translateX(-100%);transition:transform .25s}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.open{display:block}
  .main{margin-left:0}
  .mobile-header{display:flex}
  .main-pane{padding:16px}
  .stats{grid-template-columns:repeat(2,1fr)}
  .cal-day{min-height:50px}
  .cal-chip{display:none}
}
</style>
</head>
<body>

<div class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-title">案件進捗</div>
    <div class="logo-sub">プロジェクト管理</div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-label">メニュー</div>
    <button class="nav-btn nav-board active" onclick="switchTab('board',this)">
      <span class="nav-dot"></span>進捗ボード
    </button>
    <button class="nav-btn nav-cal" onclick="switchTab('calendar',this)">
      <span class="nav-dot"></span>カレンダー
    </button>
    <button class="nav-btn nav-nippo" onclick="switchTab('nippo',this)">
      <span class="nav-dot"></span>日報作成
    </button>
    <button class="nav-btn nav-manage" onclick="switchTab('manage',this)">
      <span class="nav-dot"></span>案件管理
    </button>
  </nav>
  <div class="sidebar-bottom">
    <span class="sync-pill sync-ing" id="sync-status">接続中</span>
    <span class="save-flash" id="save-flash">保存しました</span>
    <span class="last-sync-txt" id="last-sync"></span>
  </div>
</div>

<div class="mobile-header">
  <button class="mobile-menu-btn" onclick="toggleMobileMenu()">メニュー</button>
  <span class="mobile-title">案件進捗</span>
  <span class="sync-pill sync-ing" id="sync-status-mobile" style="font-size:10px;padding:2px 8px">接続中</span>
</div>
<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeMobileMenu()"></div>

<div class="main">

  <!-- 進捗ボード -->
  <div id="pane-board" class="main-pane active">
    <div class="pane-title">進捗ボード</div>
    <div class="stats">
      <div class="stat stat-total"><div class="stat-num" id="s-total" style="color:#2c3e6b">0</div><div class="stat-lbl">案件数</div></div>
      <div class="stat stat-urgent"><div class="stat-num" style="color:#ef4444" id="s-urgent">0</div><div class="stat-lbl">要対応</div></div>
      <div class="stat stat-inprog"><div class="stat-num" style="color:#f59e0b" id="s-inprog">0</div><div class="stat-lbl">進行中</div></div>
      <div class="stat stat-done"><div class="stat-num" style="color:#10b981" id="s-done">0</div><div class="stat-lbl">完了済</div></div>
    </div>
    <div class="sort-row">
      <span class="sort-lbl">並び順</span>
      <button class="sort-btn active" onclick="setSort('status',this)">ステータス</button>
      <button class="sort-btn" onclick="setSort('name',this)">案件名</button>
      <button class="sort-btn" onclick="setSort('deadline',this)">納期</button>
    </div>
    <div id="project-list"><div class="loading">読み込み中...</div></div>
  </div>

  <!-- カレンダー -->
  <div id="pane-calendar" class="main-pane">
    <div class="pane-title">カレンダー</div>
    <div class="cal-header">
      <button class="cal-nav" onclick="calMove(-1)">前月</button>
      <div class="cal-title" id="cal-title"></div>
      <button class="cal-nav" onclick="calMove(1)">次月</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div style="margin-top:10px;font-size:12px;color:#94a3b8">タスクのある日をクリックすると詳細を確認できます</div>
  </div>

  <!-- 日報 -->
  <div id="pane-nippo" class="main-pane">
    <div class="pane-title">日報作成</div>
    <div class="form-card">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
        <span style="font-size:12px;color:#374151;font-weight:600">対象日</span>
        <input type="date" id="nippo-date" style="width:auto;margin-bottom:0"/>
      </div>
      <label class="form-label">今日やったこと</label>
      <textarea id="today-input" placeholder="例：山田プレスLP 修正完了&#10;丸眞 キックオフ調整完了"></textarea>
      <label class="form-label">明日やること</label>
      <textarea id="tomorrow-input" placeholder="例：野田商店 Q&A確認&#10;GY ヨルーム投稿画像制作"></textarea>
      <label class="form-label">特記事項（任意）</label>
      <textarea id="memo-input" style="min-height:50px" placeholder="例：◯◯さん先方返信待ち"></textarea>
      <div class="btn-row">
        <button class="btn btn-green" onclick="generateNippo()">日報を生成</button>
        <button class="btn" id="copy-btn" onclick="copyNippo()">コピー</button>
      </div>
    </div>
    <div id="nippo-out-wrap" style="display:none">
      <div class="form-label" style="margin-bottom:8px">生成された日報</div>
      <div class="nippo-out" id="nippo-output"></div>
    </div>
  </div>

  <!-- 管理 -->
  <div id="pane-manage" class="main-pane">
    <div class="pane-title">案件管理</div>
    <div class="form-card">
      <div class="form-card-title">新規案件を追加</div>
      <label class="form-label">案件名</label>
      <input type="text" id="new-name" placeholder="例：〇〇 サイトリニューアル"/>
      <label class="form-label">案件の納期</label>
      <input type="text" id="new-deadline" placeholder="例：4月末、未定、随時"/>
      <label class="form-label">ステータス</label>
      <select id="new-status">
        <option value="urgent">要対応</option>
        <option value="inprog" selected>進行中</option>
        <option value="wait">待ち</option>
        <option value="done">完了</option>
      </select>
      <label class="form-label">タスク（1行1タスク）※納期日は追加後に編集で設定できます</label>
      <textarea id="new-tasks" placeholder="ヒアリング&#10;見積もり作成&#10;デザイン制作"></textarea>
      <div class="btn-row"><button class="btn btn-amber" onclick="addProject()">追加する</button></div>
    </div>
    <div class="form-card">
      <div class="form-card-title">データについて</div>
      <div class="info-box">データはFirebaseクラウドに自動保存されます。<br>どのデバイスからでも同じデータにアクセスできます。<br>接続先：tasuku-3e8ac (Firestore)</div>
    </div>
  </div>

</div>

<!-- 編集モーダル -->
<div class="overlay" id="edit-modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title">案件を編集</div>
    <input type="hidden" id="edit-id"/>
    <label class="form-label">案件名</label>
    <input type="text" id="edit-name"/>
    <label class="form-label">案件の納期</label>
    <input type="text" id="edit-deadline"/>
    <label class="form-label">ステータス</label>
    <select id="edit-status">
      <option value="urgent">要対応</option>
      <option value="inprog">進行中</option>
      <option value="wait">待ち</option>
      <option value="done">完了</option>
    </select>
    <label class="form-label">タスク・納期日</label>
    <div style="display:grid;grid-template-columns:1fr 120px 28px;gap:6px;margin-bottom:6px">
      <span style="font-size:11px;color:#94a3b8;font-weight:500">タスク名</span>
      <span style="font-size:11px;color:#94a3b8;font-weight:500">納期日</span>
      <span></span>
    </div>
    <div id="edit-tasks-list"></div>
    <button class="btn" onclick="addEditTask()" style="margin-top:6px;font-size:12px">+ タスクを追加</button>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-blue" onclick="saveEdit()">保存</button>
    </div>
  </div>
</div>

<!-- カレンダー詳細モーダル -->
<div class="overlay" id="cal-modal" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="modal">
    <div class="modal-title" id="cal-modal-title"></div>
    <div id="cal-modal-body"></div>
    <div class="modal-footer"><button class="btn" onclick="document.getElementById('cal-modal').classList.remove('open')">閉じる</button></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot, collection, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBpn6WRCh0UDmF5KkhcQihEJMQLniPQ3jc",
  authDomain: "tasuku-3e8ac.firebaseapp.com",
  projectId: "tasuku-3e8ac",
  storageBucket: "tasuku-3e8ac.firebasestorage.app",
  messagingSenderId: "551813900502",
  appId: "1:551813900502:web:753645be12622952108177",
  measurementId: "G-H6RSQR3TYB"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const colRef = collection(db, 'projects');

let projects = [];
let currentSort = 'status';
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();

function setSyncStatus(s) {
  ['sync-status','sync-status-mobile'].forEach(id=>{
    const el=document.getElementById(id);
    if(!el)return;
    el.className='sync-pill';
    if(s==='ok'){el.classList.add('sync-ok');el.textContent='同期済';}
    if(s==='err'){el.classList.add('sync-err');el.textContent='エラー';}
    if(s==='ing'){el.classList.add('sync-ing');el.textContent='同期中';}
  });
}
function flash(){
  const el=document.getElementById('save-flash');
  el.classList.add('show');
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.classList.remove('show'),1800);
}

onSnapshot(colRef,snap=>{
  const data=[];
  snap.forEach(d=>data.push(d.data()));
  data.sort((a,b)=>(a.order||0)-(b.order||0));
  projects=data;
  renderProjects();
  renderCal();
  setSyncStatus('ok');
  document.getElementById('last-sync').textContent=new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})+' 更新';
},()=>setSyncStatus('err'));

async function saveP(p){setSyncStatus('ing');try{await setDoc(doc(db,'projects',p.id),p);flash();}catch{setSyncStatus('err');}}
async function delP(pid){setSyncStatus('ing');try{await deleteDoc(doc(db,'projects',pid));}catch{setSyncStatus('err');}}

const dOrd=d=>{if(!d)return 18;if(d.includes('4/3')||d.includes('4月3'))return 1;if(d.includes('今週'))return 2;if(d.includes('4月頭'))return 3;if(d.includes('4/10')||d.includes('4月10'))return 4;if(d.includes('4月中旬'))return 5;if(d.includes('4/15')||d.includes('4月15'))return 6;if(d.includes('4月17')||d.includes('4/17'))return 7;if(d.includes('来週'))return 8;if(d.includes('4月末')||d.includes('近日'))return 9;if(d.includes('来月'))return 10;if(d.includes('6月'))return 13;if(d.includes('8月'))return 14;return 17;};
const sOrd={urgent:0,inprog:1,wait:2,done:3};
const sLbl={urgent:'要対応',inprog:'進行中',wait:'待ち',done:'完了'};
const bCls={urgent:'b-danger',inprog:'b-warning',wait:'b-info',done:'b-success'};
const cardBorderCls={urgent:'card-urgent',inprog:'card-inprog',wait:'card-wait',done:'card-done'};
const pCls={urgent:'pf-danger',inprog:'pf-warning',wait:'pf-info',done:'pf-success'};
const cCls={urgent:'chip-danger',inprog:'chip-warning',wait:'chip-info',done:'chip-success'};
const gtCls={urgent:'gt-urgent',inprog:'gt-inprog',wait:'gt-wait',done:'gt-done'};
const gNm={urgent:'要対応 / 今週中',inprog:'進行中',wait:'先方・社内待ち',done:'ほぼ完了'};

function getSorted(){const arr=[...projects];if(currentSort==='name')return arr.sort((a,b)=>a.name.localeCompare(b.name,'ja'));if(currentSort==='deadline')return arr.sort((a,b)=>dOrd(a.deadline)-dOrd(b.deadline));return arr.sort((a,b)=>sOrd[a.status]-sOrd[b.status]);}
window.setSort=(t,el)=>{currentSort=t;document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');renderProjects();};
function calcProg(p){return p.tasks.length?Math.round(p.tasks.filter(t=>t.done).length/p.tasks.length*100):0;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(d){if(!d)return '';try{const dt=new Date(d+'T00:00:00');return `${dt.getMonth()+1}/${dt.getDate()}`;}catch{return d;}}
function isOver(d){if(!d)return false;try{return new Date(d+'T23:59:59')<new Date();}catch{return false;}}
function isSoon(d){if(!d)return false;try{const diff=(new Date(d+'T23:59:59')-new Date())/864e5;return diff>=0&&diff<=3;}catch{return false;}}

function cardHTML(p){
  const done=p.tasks.filter(t=>t.done).length;
  const prog=calcProg(p);
  let h=`<div class="card ${cardBorderCls[p.status]}">
    <div class="card-top">
      <span class="card-name">${esc(p.name)}</span>
      <span class="badge ${bCls[p.status]}" onclick="cycleStatus('${p.id}')" title="クリックでステータス変更">${sLbl[p.status]}</span>
    </div><ul class="tasks">`;
  p.tasks.forEach(t=>{
    const over=!t.done&&isOver(t.dueDate);
    const soon=!t.done&&!over&&isSoon(t.dueDate);
    const ds=fmtDate(t.dueDate);
    const dbCls=over?'overdue':soon?'soon':'normal';
    h+=`<li class="task-item${t.done?' done':''}" onclick="toggleTask('${p.id}','${t.id}')">
      <span class="chk">${t.done?'✓':''}</span>
      <span class="task-main">
        <span class="task-txt">${esc(t.text)}</span>
        ${ds?`<span class="task-date-badge ${dbCls}">${ds}</span>`:''}
      </span>
    </li>`;
  });
  h+=`</ul>
    <div class="prog-wrap"><div class="prog-bar"><div class="prog-fill ${pCls[p.status]}" style="width:${prog}%"></div></div></div>
    <div class="card-footer">
      <span class="card-meta">納期：${esc(p.deadline)}　${done}/${p.tasks.length}完了</span>
      <div class="card-acts">
        <button class="act-btn act-edit" onclick="openEdit('${p.id}')">編集</button>
        <button class="act-btn act-del" onclick="deleteProject('${p.id}')">削除</button>
      </div>
    </div>
  </div>`;
  return h;
}

function renderProjects(){
  const list=document.getElementById('project-list');
  const sorted=getSorted();
  const t={total:projects.length,urgent:0,inprog:0,done:0};
  projects.forEach(p=>{if(p.status==='urgent')t.urgent++;if(p.status==='inprog')t.inprog++;if(p.status==='done')t.done++;});
  let html='';
  if(currentSort==='status'){
    const g={urgent:[],inprog:[],wait:[],done:[]};
    sorted.forEach(p=>g[p.status].push(p));
    ['urgent','inprog','wait','done'].forEach(s=>{
      if(!g[s].length)return;
      html+=`<div class="group-wrap"><div class="group-title ${gtCls[s]}">${gNm[s]}</div>`;
      g[s].forEach(p=>{html+=cardHTML(p);});
      html+='</div>';
    });
  }else{sorted.forEach(p=>{html+=cardHTML(p);});}
  list.innerHTML=html;
  document.getElementById('s-total').textContent=t.total;
  document.getElementById('s-urgent').textContent=t.urgent;
  document.getElementById('s-inprog').textContent=t.inprog;
  document.getElementById('s-done').textContent=t.done;
}

function renderCal(){
  const title=document.getElementById('cal-title');
  const grid=document.getElementById('cal-grid');
  if(!title||!grid)return;
  title.textContent=`${calYear}年${calMonth+1}月`;
  const dows=['日','月','火','水','木','金','土'];
  let html=dows.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const lastDate=new Date(calYear,calMonth+1,0).getDate();
  const prevLast=new Date(calYear,calMonth,0).getDate();
  const now=new Date();
  const todayStr=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  const byDate={};
  projects.forEach(p=>p.tasks.forEach(t=>{if(t.dueDate){if(!byDate[t.dueDate])byDate[t.dueDate]=[];byDate[t.dueDate].push({...t,pName:p.name,pStatus:p.status});}}));
  for(let i=firstDay-1;i>=0;i--)html+=`<div class="cal-day other"><div class="cal-num">${prevLast-i}</div></div>`;
  let cells=firstDay;
  for(let d=1;d<=lastDate;d++){
    const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=ds===todayStr;
    const tasks=byDate[ds]||[];
    let chips='';
    tasks.slice(0,3).forEach(t=>{const cl=t.done?'chip-done':cCls[t.pStatus]||'chip-info';const nm=t.pName.length>6?t.pName.slice(0,6)+'…':t.pName;chips+=`<div class="cal-chip ${cl}">${esc(nm)}</div>`;});
    if(tasks.length>3)chips+=`<div class="cal-more">+${tasks.length-3}件</div>`;
    html+=`<div class="cal-day${isToday?' today':''}${tasks.length?' has-tasks':''}" ${tasks.length?`onclick="openCalDetail('${ds}')"`:''}><div class="cal-num">${d}</div>${chips}</div>`;
    cells++;
  }
  const rem=7-(cells%7);
  if(rem<7)for(let d=1;d<=rem;d++)html+=`<div class="cal-day other"><div class="cal-num">${d}</div></div>`;
  grid.innerHTML=html;
}
window.calMove=(dir)=>{calMonth+=dir;if(calMonth>11){calMonth=0;calYear++;}if(calMonth<0){calMonth=11;calYear--;}renderCal();};
window.openCalDetail=(ds)=>{
  const tasks=[];
  projects.forEach(p=>p.tasks.forEach(t=>{if(t.dueDate===ds)tasks.push({...t,pName:p.name,pStatus:p.status});}));
  const dt=new Date(ds+'T00:00:00');
  document.getElementById('cal-modal-title').textContent=`${dt.getMonth()+1}月${dt.getDate()}日のタスク`;
  let html='';
  if(!tasks.length)html='<p style="color:#94a3b8;font-size:13px;padding:8px 0">この日のタスクはありません</p>';
  else tasks.forEach(t=>{const cl=t.done?'chip-done':cCls[t.pStatus]||'chip-info';html+=`<div class="cal-detail-item"><span class="cal-chip ${cl}" style="flex-shrink:0;white-space:nowrap">${esc(t.pName)}</span><span style="${t.done?'text-decoration:line-through;color:#94a3b8':''}">${esc(t.text)}</span></div>`;});
  document.getElementById('cal-modal-body').innerHTML=html;
  document.getElementById('cal-modal').classList.add('open');
};

window.toggleTask=(pid,tid)=>{const p=projects.find(x=>x.id===pid);const t=p&&p.tasks.find(x=>x.id===tid);if(!t)return;t.done=!t.done;p.progress=calcProg(p);saveP(p);};
window.cycleStatus=(pid)=>{const order=['urgent','inprog','wait','done'];const p=projects.find(x=>x.id===pid);if(!p)return;p.status=order[(order.indexOf(p.status)+1)%order.length];saveP(p);};
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
window.addProject=()=>{
  const name=document.getElementById('new-name').value.trim();
  if(!name){alert('案件名を入力してください');return;}
  const deadline=document.getElementById('new-deadline').value.trim()||'未定';
  const status=document.getElementById('new-status').value;
  const raw=document.getElementById('new-tasks').value.trim();
  const tasks=raw?raw.split('\n').filter(l=>l.trim()).map(l=>({id:uid(),text:l.trim(),done:false,dueDate:''})):[{id:uid(),text:'対応中',done:false,dueDate:''}];
  saveP({id:uid(),name,deadline,status,tasks,progress:0,order:Date.now()});
  document.getElementById('new-name').value='';document.getElementById('new-deadline').value='';document.getElementById('new-tasks').value='';
  switchTab('board',document.querySelector('.nav-board'));
  alert(`「${name}」を追加しました`);
};
window.deleteProject=(pid)=>{const p=projects.find(x=>x.id===pid);if(!p||!confirm(`「${p.name}」を削除しますか？`))return;delP(pid);};
window.openEdit=(pid)=>{
  const p=projects.find(x=>x.id===pid);if(!p)return;
  document.getElementById('edit-id').value=pid;
  document.getElementById('edit-name').value=p.name;
  document.getElementById('edit-deadline').value=p.deadline;
  document.getElementById('edit-status').value=p.status;
  document.getElementById('edit-tasks-list').innerHTML=p.tasks.map(t=>`<div class="task-edit-row"><input type="text" value="${esc(t.text)}" data-id="${t.id}" data-done="${t.done}" placeholder="タスク名" style="margin-bottom:0"/><input type="date" value="${t.dueDate||''}" style="margin-bottom:0"/><button class="rm-btn" onclick="this.parentElement.remove()">x</button></div>`).join('');
  document.getElementById('edit-modal').classList.add('open');
};
window.addEditTask=()=>{const div=document.createElement('div');div.className='task-edit-row';div.innerHTML=`<input type="text" placeholder="タスク名" data-id="${uid()}" data-done="false" style="margin-bottom:0"/><input type="date" style="margin-bottom:0"/><button class="rm-btn" onclick="this.parentElement.remove()">x</button>`;document.getElementById('edit-tasks-list').appendChild(div);};
window.saveEdit=()=>{
  const pid=document.getElementById('edit-id').value;const p=projects.find(x=>x.id===pid);if(!p)return;
  p.name=document.getElementById('edit-name').value.trim()||p.name;
  p.deadline=document.getElementById('edit-deadline').value.trim()||p.deadline;
  p.status=document.getElementById('edit-status').value;
  p.tasks=Array.from(document.querySelectorAll('#edit-tasks-list .task-edit-row')).map(row=>{const ti=row.querySelector('input[type=text]');const di=row.querySelector('input[type=date]');if(!ti||!ti.value.trim())return null;return{id:ti.dataset.id||uid(),text:ti.value.trim(),done:ti.dataset.done==='true',dueDate:di?di.value:''};}).filter(Boolean);
  p.progress=calcProg(p);saveP(p);closeModal();
};
window.closeModal=()=>document.getElementById('edit-modal').classList.remove('open');
window.generateNippo=()=>{
  const d=document.getElementById('nippo-date').value;
  const today=document.getElementById('today-input').value.trim();
  const tmr=document.getElementById('tomorrow-input').value.trim();
  const memo=document.getElementById('memo-input').value.trim();
  const dateStr=d?new Date(d).toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'short'}):'（日付未設定）';
  const fmt=t=>t?t.split('\n').map(l=>`　・${l}`).join('\n'):'　（未入力）';
  let text=`【日報】${dateStr}\n\n■ 本日の作業内容\n${fmt(today)}\n\n■ 明日の予定\n${fmt(tmr)}\n`;
  if(memo)text+=`\n■ 特記事項・連絡\n　${memo.split('\n').join('\n　')}\n`;
  document.getElementById('nippo-output').textContent=text;document.getElementById('nippo-out-wrap').style.display='block';
};
window.copyNippo=()=>{const text=document.getElementById('nippo-output').textContent;if(!text)return;navigator.clipboard.writeText(text).then(()=>{const btn=document.getElementById('copy-btn');btn.textContent='コピーしました';setTimeout(()=>btn.textContent='コピー',1500);});};
window.switchTab=(t,el)=>{
  ['board','calendar','nippo','manage'].forEach(id=>document.getElementById('pane-'+id).classList.toggle('active',id===t));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  if(el&&el.classList)el.classList.add('active');
  if(t==='calendar')renderCal();
  closeMobileMenu();
};
window.toggleMobileMenu=()=>{document.getElementById('sidebar').classList.toggle('open');document.getElementById('sidebar-overlay').classList.toggle('open');};
window.closeMobileMenu=()=>{document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebar-overlay').classList.remove('open');};
document.getElementById('nippo-date').value=new Date().toISOString().split('T')[0];
</script>
</body>
</html>
