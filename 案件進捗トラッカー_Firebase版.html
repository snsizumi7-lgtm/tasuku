<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>案件進捗トラッカー</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif;background:#f5f4f0;color:#1a1a1a;padding:1.5rem;max-width:800px;margin:0 auto}
h1{font-size:20px;font-weight:600;margin-bottom:2px}
.subtitle{font-size:12px;color:#888780;margin-bottom:1.2rem}
.tabs{display:flex;gap:8px;margin-bottom:1.5rem;border-bottom:1px solid #d3d1c7}
.tab{padding:8px 16px;font-size:14px;font-weight:500;cursor:pointer;border:none;background:none;color:#5f5e5a;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.active{color:#1a1a1a;border-bottom-color:#1a1a1a}
.pane{display:none}.pane.active{display:block}
.section{margin-bottom:1.5rem}
.section-title{font-size:12px;font-weight:600;color:#888780;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
.project-card{background:#fff;border:1px solid #d3d1c7;border-radius:12px;padding:12px 14px;margin-bottom:8px}
.project-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.project-name{font-size:14px;font-weight:600;color:#1a1a1a;flex:1}
.badge{font-size:11px;padding:2px 8px;border-radius:999px;white-space:nowrap;margin-left:6px;font-weight:500;cursor:pointer;user-select:none}
.badge-danger{background:#fcebeb;color:#a32d2d}
.badge-warning{background:#faeeda;color:#854f0b}
.badge-success{background:#eaf3de;color:#3b6d11}
.badge-info{background:#e6f1fb;color:#185fa5}
.tasks{list-style:none;margin-top:4px}
.task{font-size:13px;color:#5f5e5a;padding:3px 0;display:flex;gap:8px;align-items:flex-start;cursor:pointer}
.task:hover .task-check{border-color:#888780}
.task.done .task-text{text-decoration:line-through;opacity:.45}
.task-check{flex-shrink:0;width:15px;height:15px;border:1.5px solid #d3d1c7;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;background:#fff;margin-top:1px}
.task.done .task-check{background:#639922;border-color:#639922;color:#fff}
.task-text{flex:1;line-height:1.5}
.progress-bar{height:4px;background:#e8e6e0;border-radius:999px;margin-top:8px;overflow:hidden}
.progress-fill{height:100%;border-radius:999px;transition:width .4s}
.fill-danger{background:#e24b4a}.fill-warning{background:#ef9f27}.fill-success{background:#639922}.fill-info{background:#378add}
.card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.card-meta{font-size:12px;color:#888780}
.card-actions{display:flex;gap:4px}
.icon-btn{font-size:12px;color:#b4b2a9;cursor:pointer;border:none;background:none;padding:2px 6px;border-radius:4px;line-height:1}
.icon-btn:hover{color:#5f5e5a;background:#f0ede8}
.form-label{font-size:13px;font-weight:500;color:#5f5e5a;margin-bottom:6px;display:block}
input[type=text],textarea,select{width:100%;padding:8px 10px;border:1px solid #c8c6bc;border-radius:8px;background:#fff;color:#1a1a1a;font-size:13px;font-family:inherit;margin-bottom:8px}
input[type=text]:focus,textarea:focus,select:focus{outline:none;border-color:#888780}
textarea{resize:vertical;min-height:70px}
.output-box{background:#fff;border:1px solid #c8c6bc;border-radius:12px;padding:14px;white-space:pre-wrap;font-size:13px;line-height:1.7;color:#1a1a1a;min-height:60px}
.btn{padding:7px 16px;border:1px solid #c8c6bc;border-radius:8px;background:#fff;color:#1a1a1a;font-size:13px;cursor:pointer;font-family:inherit}
.btn:hover{background:#f0ede8}
.btn-primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.btn-primary:hover{background:#333}
.btn-danger{background:#fcebeb;color:#a32d2d;border-color:#f0c0c0}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.stat-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:1rem}
.stat{background:#ebe9e2;border-radius:8px;padding:12px;text-align:center}
.stat-num{font-size:22px;font-weight:600}
.stat-lbl{font-size:12px;color:#888780;margin-top:2px}
.sort-bar{display:flex;align-items:center;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.sort-label{font-size:12px;color:#888780}
.sort-btn{padding:4px 12px;font-size:12px;border:1px solid #c8c6bc;border-radius:999px;background:#fff;color:#5f5e5a;cursor:pointer;font-family:inherit}
.sort-btn:hover{background:#f0ede8}
.sort-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.section-box{background:#f0ede8;border-radius:12px;padding:16px;margin-bottom:1rem}
.save-indicator{font-size:11px;color:#639922;margin-left:8px;opacity:0;transition:opacity .3s}
.save-indicator.show{opacity:1}
.sync-status{font-size:11px;padding:3px 10px;border-radius:999px;margin-left:8px}
.sync-ok{background:#eaf3de;color:#3b6d11}
.sync-err{background:#fcebeb;color:#a32d2d}
.sync-ing{background:#faeeda;color:#854f0b}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:24px;width:90%;max-width:460px;max-height:90vh;overflow-y:auto}
.modal h2{font-size:16px;font-weight:600;margin-bottom:16px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.task-row{display:flex;gap:6px;align-items:center;margin-bottom:6px}
.task-row input{flex:1;margin-bottom:0}
.task-row .rm{flex-shrink:0;background:none;border:none;color:#b4b2a9;cursor:pointer;font-size:18px;line-height:1;padding:0 2px}
.task-row .rm:hover{color:#a32d2d}
.loading{text-align:center;padding:2rem;color:#888780;font-size:14px}
</style>
</head>
<body>

<div style="display:flex;align-items:baseline;gap:6px;margin-bottom:2px;flex-wrap:wrap">
  <h1>案件進捗トラッカー</h1>
  <span class="save-indicator" id="save-ind">保存しました ✓</span>
  <span class="sync-status sync-ing" id="sync-status">接続中...</span>
</div>
<p class="subtitle" id="subtitle">Firebaseに接続しています...</p>

<div class="tabs">
  <button class="tab active" onclick="switchTab('progress',0)">案件進捗</button>
  <button class="tab" onclick="switchTab('nippo',1)">日報作成</button>
  <button class="tab" onclick="switchTab('manage',2)">案件管理</button>
</div>

<div id="pane-progress" class="pane active">
  <div class="stat-grid">
    <div class="stat"><div class="stat-num" id="s-total" style="color:#1a1a1a">0</div><div class="stat-lbl">案件数</div></div>
    <div class="stat"><div class="stat-num" style="color:#e24b4a" id="s-urgent">0</div><div class="stat-lbl">要対応</div></div>
    <div class="stat"><div class="stat-num" style="color:#ef9f27" id="s-inprog">0</div><div class="stat-lbl">進行中</div></div>
    <div class="stat"><div class="stat-num" style="color:#639922" id="s-done">0</div><div class="stat-lbl">完了済</div></div>
  </div>
  <div class="sort-bar">
    <span class="sort-label">並び順：</span>
    <button class="sort-btn active" onclick="setSort('status',this)">ステータス別</button>
    <button class="sort-btn" onclick="setSort('name',this)">案件名順</button>
    <button class="sort-btn" onclick="setSort('deadline',this)">納期順</button>
  </div>
  <div id="project-list"><div class="loading">データを読み込み中...</div></div>
</div>

<div id="pane-nippo" class="pane">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:1rem">
    <span style="font-size:13px;color:#5f5e5a">対象日</span>
    <input type="date" id="nippo-date" style="width:auto;margin-bottom:0"/>
  </div>
  <div class="section-box">
    <label class="form-label">今日やったこと</label>
    <textarea id="today-input" placeholder="例：山田プレスLP 修正完了&#10;丸眞 キックオフ調整完了"></textarea>
    <label class="form-label">明日やること</label>
    <textarea id="tomorrow-input" placeholder="例：野田商店 Q&A確認&#10;GY ヨルーム投稿画像制作"></textarea>
    <label class="form-label">特記事項（任意）</label>
    <textarea id="memo-input" style="min-height:50px" placeholder="例：◯◯さん先方返信待ち"></textarea>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="generateNippo()">日報を生成</button>
      <button class="btn" id="copy-btn" onclick="copyNippo()">コピー</button>
    </div>
  </div>
  <div id="nippo-out-wrap" style="display:none;margin-bottom:1rem">
    <div class="form-label" style="margin-bottom:6px">生成された日報</div>
    <div class="output-box" id="nippo-output"></div>
  </div>
</div>

<div id="pane-manage" class="pane">
  <div class="section-box" style="margin-bottom:1rem">
    <div style="font-size:14px;font-weight:600;margin-bottom:12px">新規案件を追加</div>
    <label class="form-label">案件名</label>
    <input type="text" id="new-name" placeholder="例：〇〇 サイトリニューアル"/>
    <label class="form-label">納期</label>
    <input type="text" id="new-deadline" placeholder="例：4月末、未定、随時"/>
    <label class="form-label">ステータス</label>
    <select id="new-status">
      <option value="urgent">要対応</option>
      <option value="inprog" selected>進行中</option>
      <option value="wait">待ち</option>
      <option value="done">完了</option>
    </select>
    <label class="form-label">タスク（1行1タスク）</label>
    <textarea id="new-tasks" placeholder="ヒアリング&#10;見積もり作成&#10;デザイン制作"></textarea>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="addProject()">追加する</button>
    </div>
  </div>
  <div class="section-box">
    <div style="font-size:14px;font-weight:600;margin-bottom:4px">データについて</div>
    <p style="font-size:12px;color:#888780;margin-bottom:8px">データはFirebaseクラウドに自動保存されます。どのデバイスからでも同じデータにアクセスできます。</p>
    <div style="font-size:12px;background:#fff;border-radius:8px;padding:10px;color:#5f5e5a">
      接続先：tasuku-3e8ac (Firebase Firestore)<br>
      保存方式：リアルタイム自動同期
    </div>
  </div>
</div>

<div class="modal-overlay" id="edit-modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2>案件を編集</h2>
    <input type="hidden" id="edit-id"/>
    <label class="form-label">案件名</label>
    <input type="text" id="edit-name"/>
    <label class="form-label">納期</label>
    <input type="text" id="edit-deadline"/>
    <label class="form-label">ステータス</label>
    <select id="edit-status">
      <option value="urgent">要対応</option>
      <option value="inprog">進行中</option>
      <option value="wait">待ち</option>
      <option value="done">完了</option>
    </select>
    <label class="form-label">タスク</label>
    <div id="edit-tasks-list"></div>
    <button class="btn" onclick="addEditTask()" style="margin-top:4px;font-size:12px">＋ タスクを追加</button>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveEdit()">保存</button>
    </div>
  </div>
</div>

let projects = [];
let currentSort = 'status';

// Firestoreリアルタイム同期
const colRef = collection(db, 'projects');

function setSyncStatus(state) {
  const el = document.getElementById('sync-status');
  el.className = 'sync-status';
  if(state === 'ok')  { el.classList.add('sync-ok');  el.textContent = '● クラウド同期済'; }
  if(state === 'err') { el.classList.add('sync-err'); el.textContent = '● 接続エラー'; }
  if(state === 'ing') { el.classList.add('sync-ing'); el.textContent = '● 同期中...'; }
}

// リアルタイムリスナー（他のデバイスでの変更も即反映）
onSnapshot(colRef, (snapshot) => {
  if(snapshot.empty && projects.length === 0) {
    // 初回：初期データを書き込む
    initializeFirestore();
    return;
  }
  const data = [];
  snapshot.forEach(docSnap => { data.push(docSnap.data()); });
  // order順にソートして表示
  data.sort((a,b) => (a.order||0) - (b.order||0));
  projects = data;
  renderProjects();
  setSyncStatus('ok');
  document.getElementById('subtitle').textContent =
    '最終同期：' + new Date().toLocaleTimeString('ja-JP');
}, (error) => {
  setSyncStatus('err');
  document.getElementById('subtitle').textContent = '接続エラー：' + error.message;
});

async function initializeFirestore() {
  setSyncStatus('ing');
  for(let i = 0; i < INITIAL_DATA.length; i++) {
    const p = { ...INITIAL_DATA[i], order: i };
    await setDoc(doc(db, 'projects', p.id), p);
  }
}

async function saveProject(p) {
  setSyncStatus('ing');
  try {
    await setDoc(doc(db, 'projects', p.id), p);
    showSaveIndicator();
  } catch(e) {
    setSyncStatus('err');
  }
}

async function removeProject(pid) {
  setSyncStatus('ing');
  try {
    await deleteDoc(doc(db, 'projects', pid));
  } catch(e) {
    setSyncStatus('err');
  }
}

function showSaveIndicator() {
  const ind = document.getElementById('save-ind');
  ind.classList.add('show');
  clearTimeout(ind._t);
  ind._t = setTimeout(() => ind.classList.remove('show'), 1800);
}

// ── ソート・表示 ──
const deadlineOrder = d => {
  if(d.includes('4/3')||d.includes('4月3'))return 1;
  if(d.includes('今週'))return 2;
  if(d.includes('4月頭'))return 3;
  if(d.includes('4/10')||d.includes('4月10'))return 4;
  if(d.includes('4月中旬'))return 5;
  if(d.includes('4/15')||d.includes('4月15'))return 6;
  if(d.includes('4月17')||d.includes('4/17'))return 7;
  if(d.includes('来週'))return 8;
  if(d.includes('4月末')||d.includes('近日'))return 9;
  if(d.includes('来月'))return 10;
  if(d.includes('6月'))return 13;
  if(d.includes('8月'))return 14;
  return 17;
};
const statusOrder={urgent:0,inprog:1,wait:2,done:3};
const statusLabel={urgent:"要対応",inprog:"進行中",wait:"待ち",done:"完了"};
const statusClass={urgent:"badge-danger",inprog:"badge-warning",wait:"badge-info",done:"badge-success"};
const fillClass={urgent:"fill-danger",inprog:"fill-warning",wait:"fill-info",done:"fill-success"};
const groupName={urgent:"要対応 / 今週中",inprog:"進行中",wait:"先方・社内待ち",done:"ほぼ完了"};

function getSorted(){
  const arr=[...projects];
  if(currentSort==='name')return arr.sort((a,b)=>a.name.localeCompare(b.name,'ja'));
  if(currentSort==='deadline')return arr.sort((a,b)=>deadlineOrder(a.deadline)-deadlineOrder(b.deadline));
  return arr.sort((a,b)=>statusOrder[a.status]-statusOrder[b.status]);
}
window.setSort = function(type,el){
  currentSort=type;
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderProjects();
};

function calcProg(p){return p.tasks.length?Math.round(p.tasks.filter(t=>t.done).length/p.tasks.length*100):0;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function cardHTML(p){
  const done=p.tasks.filter(t=>t.done).length;
  const prog=calcProg(p);
  let h=`<div class="project-card">
    <div class="project-header">
      <span class="project-name">${esc(p.name)}</span>
      <span class="badge ${statusClass[p.status]}" onclick="cycleStatus('${p.id}')" title="クリックでステータス変更">${statusLabel[p.status]}</span>
    </div><ul class="tasks">`;
  p.tasks.forEach(t=>{
    h+=`<li class="task${t.done?' done':''}" onclick="toggleTask('${p.id}','${t.id}')">
      <span class="task-check">${t.done?'✓':''}</span>
      <span class="task-text">${esc(t.text)}</span>
    </li>`;
  });
  h+=`</ul>
    <div class="card-footer">
      <span class="card-meta">納期：${esc(p.deadline)}　${done}/${p.tasks.length}完了</span>
      <div class="card-actions">
        <button class="icon-btn" onclick="openEdit('${p.id}')" title="編集">✏️</button>
        <button class="icon-btn" onclick="deleteProject('${p.id}')" title="削除">🗑</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill ${fillClass[p.status]}" style="width:${prog}%"></div></div>
  </div>`;
  return h;
}

function renderProjects(){
  const list=document.getElementById('project-list');
  const sorted=getSorted();
  const totals={total:projects.length,urgent:0,inprog:0,done:0};
  projects.forEach(p=>{
    if(p.status==='urgent')totals.urgent++;
    if(p.status==='inprog')totals.inprog++;
    if(p.status==='done')totals.done++;
  });
  let html='';
  if(currentSort==='status'){
    const groups={urgent:[],inprog:[],wait:[],done:[]};
    sorted.forEach(p=>groups[p.status].push(p));
    ['urgent','inprog','wait','done'].forEach(s=>{
      if(!groups[s].length)return;
      html+=`<div class="section"><div class="section-title">${groupName[s]}</div>`;
      groups[s].forEach(p=>{html+=cardHTML(p);});
      html+='</div>';
    });
  }else{
    html='<div class="section">';
    sorted.forEach(p=>{html+=cardHTML(p);});
    html+='</div>';
  }
  list.innerHTML=html;
  document.getElementById('s-total').textContent=totals.total;
  document.getElementById('s-urgent').textContent=totals.urgent;
  document.getElementById('s-inprog').textContent=totals.inprog;
  document.getElementById('s-done').textContent=totals.done;
}

// ── インタラクション ──
window.toggleTask = function(pid,tid){
  const p=projects.find(x=>x.id===pid);
  const t=p&&p.tasks.find(x=>x.id===tid);
  if(!t)return;
  t.done=!t.done;
  p.progress=calcProg(p);
  saveProject(p);
};
window.cycleStatus = function(pid){
  const order=['urgent','inprog','wait','done'];
  const p=projects.find(x=>x.id===pid);
  if(!p)return;
  p.status=order[(order.indexOf(p.status)+1)%order.length];
  saveProject(p);
};

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

window.addProject = function(){
  const name=document.getElementById('new-name').value.trim();
  if(!name){alert('案件名を入力してください');return;}
  const deadline=document.getElementById('new-deadline').value.trim()||'未定';
  const status=document.getElementById('new-status').value;
  const raw=document.getElementById('new-tasks').value.trim();
  const tasks=raw?raw.split('\n').filter(l=>l.trim()).map(l=>({id:uid(),text:l.trim(),done:false})):[{id:uid(),text:'対応中',done:false}];
  const newP={id:uid(),name,deadline,status,tasks,progress:0,order:Date.now()};
  saveProject(newP);
  document.getElementById('new-name').value='';
  document.getElementById('new-deadline').value='';
  document.getElementById('new-tasks').value='';
  switchTab('progress',0);
  alert(`「${name}」を追加しました`);
};

window.deleteProject = function(pid){
  const p=projects.find(x=>x.id===pid);
  if(!p||!confirm(`「${p.name}」を削除しますか？`))return;
  removeProject(pid);
};

window.openEdit = function(pid){
  const p=projects.find(x=>x.id===pid);
  if(!p)return;
  document.getElementById('edit-id').value=pid;
  document.getElementById('edit-name').value=p.name;
  document.getElementById('edit-deadline').value=p.deadline;
  document.getElementById('edit-status').value=p.status;
  document.getElementById('edit-tasks-list').innerHTML=p.tasks.map(t=>`
    <div class="task-row">
      <input type="text" value="${esc(t.text)}" data-id="${t.id}" data-done="${t.done}" style="margin-bottom:0"/>
      <button class="rm" onclick="this.parentElement.remove()">×</button>
    </div>`).join('');
  document.getElementById('edit-modal').classList.add('open');
};

window.addEditTask = function(){
  const div=document.createElement('div');
  div.className='task-row';
  div.innerHTML=`<input type="text" placeholder="新しいタスク" data-id="${uid()}" data-done="false" style="margin-bottom:0"/><button class="rm" onclick="this.parentElement.remove()">×</button>`;
  document.getElementById('edit-tasks-list').appendChild(div);
};

window.saveEdit = function(){
  const pid=document.getElementById('edit-id').value;
  const p=projects.find(x=>x.id===pid);
  if(!p)return;
  p.name=document.getElementById('edit-name').value.trim()||p.name;
  p.deadline=document.getElementById('edit-deadline').value.trim()||p.deadline;
  p.status=document.getElementById('edit-status').value;
  p.tasks=Array.from(document.querySelectorAll('#edit-tasks-list input')).filter(i=>i.value.trim()).map(i=>({id:i.dataset.id||uid(),text:i.value.trim(),done:i.dataset.done==='true'}));
  p.progress=calcProg(p);
  saveProject(p);
  closeModal();
};

window.closeModal = function(){ document.getElementById('edit-modal').classList.remove('open'); };

// ── 日報 ──
window.generateNippo = function(){
  const d=document.getElementById('nippo-date').value;
  const today=document.getElementById('today-input').value.trim();
  const tomorrow=document.getElementById('tomorrow-input').value.trim();
  const memo=document.getElementById('memo-input').value.trim();
  const dateStr=d?new Date(d).toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'short'}):'（日付未設定）';
  const fmt=t=>t?t.split('\n').map(l=>`　・${l}`).join('\n'):'　（未入力）';
  let text=`【日報】${dateStr}\n\n■ 本日の作業内容\n${fmt(today)}\n\n■ 明日の予定\n${fmt(tomorrow)}\n`;
  if(memo)text+=`\n■ 特記事項・連絡\n　${memo.split('\n').join('\n　')}\n`;
  document.getElementById('nippo-output').textContent=text;
  document.getElementById('nippo-out-wrap').style.display='block';
};

window.copyNippo = function(){
  const text=document.getElementById('nippo-output').textContent;
  if(!text)return;
  navigator.clipboard.writeText(text).then(()=>{
    const btn=document.getElementById('copy-btn');
    btn.textContent='コピーしました';
    setTimeout(()=>btn.textContent='コピー',1500);
  });
};

window.switchTab = function(t,idx){
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',i===idx));
  ['progress','nippo','manage'].forEach(id=>document.getElementById('pane-'+id).classList.toggle('active',id===t));
};

document.getElementById('nippo-date').value=new Date().toISOString().split('T')[0];
</script>
